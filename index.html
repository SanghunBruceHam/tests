      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

    .subtitle {
      font-size: 1.2rem;
      color: var(--text-secondary);

      line-height: 1.6;

    .tests-grid {

      border-radius: 15px;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .test-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    
    .test-card:hover::before {
      left: 100%;

    .test-card:hover {

      box-shadow: 0 15px 40px rgba(0,0,0,0.2);

<body>

  <script>
    // 언어 데이터
    const translations = {
      ko: {
        title: "심리테스트 모음집 - Tests | Mahalohana Bruce",
        description: "다양한 심리테스트를 한 곳에서! 에겐 vs 테토 성향 테스트 등 인기 심리테스트들을 무료로 체험해보세요.",
        mainTitle: "심리테스트 모음",
        mainSubtitle: "다양한 심리테스트를 통해 자신을 더 깊이 이해해보세요",
        egenTetoTitle: "에겐 vs 테토 성향 테스트",
        egenTetoDesc: "나의 성향과 찰떡궁합 이성 유형 찾기",
        testCountLabel: "테스트",
        freeLabel: "무료",
        langLabel: "언어 지원"
      },
      ja: {
        title: "心理テスト集 - Tests | Mahalohana Bruce",
        description: "様々な心理テストを一箇所で！エゲン vs テト性格診断など人気の心理テストを無料で体験してみてください。",
        mainTitle: "心理テスト集",
        mainSubtitle: "様々な心理テストを通じて自分をより深く理解してみてください",
        egenTetoTitle: "エゲン vs テト 性格診断",
        egenTetoDesc: "あなたの性格と相性ピッタリの異性タイプを見つける",
        testCountLabel: "テスト",
        freeLabel: "無料",
        langLabel: "言語対応"
      },
      en: {
        title: "Psychological Tests Collection - Tests | Mahalohana Bruce",
        description: "Various psychological tests in one place! Try popular tests like Estrogen vs Testosterone personality test for free.",
        mainTitle: "Psychological Tests",
        mainSubtitle: "Understand yourself deeper through various psychological tests",
        egenTetoTitle: "Estrogen vs Testosterone Test",
        egenTetoDesc: "Find your perfect match personality type",
        testCountLabel: "Tests",
        freeLabel: "Free",
        langLabel: "Languages"
      }
    };
    
    // 테스트 데이터 (자동 업데이트용)
    const tests = [
      {
        id: "egen-teto",
        ko: { url: "/egen-teto/ko/index.html", title: "에겐 vs 테토 성향 테스트", desc: "나의 성향과 찰떡궁합 이성 유형 찾기" },
        ja: { url: "/egen-teto/ja/index.html", title: "エゲン vs テト 性格診断", desc: "あなたの性格と相性ピッタリの異性タイプを見つける" },
        en: { url: "/egen-teto/en/index.html", title: "Estrogen vs Testosterone Test", desc: "Find your perfect match personality type" }
      }
    ];
    
    // 현재 언어 상태
    let currentLang = 'ko';
    
    // URL에서 언어 파라미터 확인
    const urlParams = new URLSearchParams(window.location.search);
    const langParam = urlParams.get('lang');
    if (langParam && translations[langParam]) {
      currentLang = langParam;
    }
    
    // 다크모드 상태
    let isDarkMode = localStorage.getItem('darkMode') === 'true';
    
    // 페이지 로드시 초기화
    document.addEventListener('DOMContentLoaded', function() {
      updateLanguage(currentLang);
      updateTheme();
      updateTestsGrid();
    });
    
    // 언어 변경 함수
    function updateLanguage(lang) {
      currentLang = lang;
      const t = translations[lang];
      
      // 메타 태그 업데이트
      document.title = t.title;
      document.querySelector('meta[name="description"]').content = t.description;
      document.querySelector('meta[property="og:title"]').content = t.title;
      document.querySelector('meta[property="og:description"]').content = t.description;
      document.querySelector('meta[name="twitter:title"]').content = t.title;
      document.querySelector('meta[name="twitter:description"]').content = t.description;
      document.documentElement.lang = lang;
      
      // 텍스트 업데이트
      document.getElementById('mainTitle').textContent = t.mainTitle;
      document.getElementById('mainSubtitle').textContent = t.mainSubtitle;
      document.getElementById('testCountLabel').textContent = t.testCountLabel;
      document.getElementById('freeLabel').textContent = t.freeLabel;
      document.getElementById('langLabel').textContent = t.langLabel;
      
      // 언어 버튼 활성화 상태 업데이트
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.lang === lang) {
          btn.classList.add('active');
        }
      });
      
      // URL 업데이트
      const newUrl = lang === 'ko' ? window.location.pathname : `${window.location.pathname}?lang=${lang}`;
      history.replaceState(null, '', newUrl);
      
      updateTestsGrid();
    }
    
    // 테스트 그리드 업데이트
    function updateTestsGrid() {
      const grid = document.getElementById('testsGrid');
      grid.innerHTML = '';
      
      tests.forEach(test => {
        const testData = test[currentLang];
        const testCard = document.createElement('a');
        testCard.href = testData.url;
        testCard.className = 'test-card';
        testCard.innerHTML = `
          <div class="test-title">${testData.title}</div>
          <div class="test-description">${testData.desc}</div>
        `;
        grid.appendChild(testCard);
      });
      
      // 테스트 개수 업데이트
      document.getElementById('testCount').textContent = tests.length;
    }
    
    // 테마 변경 함수
    function updateTheme() {
      const themeToggle = document.getElementById('themeToggle');
      const icon = themeToggle.querySelector('i');
      
      if (isDarkMode) {
        document.documentElement.setAttribute('data-theme', 'dark');
        icon.className = 'fas fa-sun';
      } else {
        document.documentElement.removeAttribute('data-theme');
        icon.className = 'fas fa-moon';
      }
      
      localStorage.setItem('darkMode', isDarkMode);
    }
    
    // 이벤트 리스너
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        updateLanguage(btn.dataset.lang);
      });
    });
    
    document.getElementById('themeToggle').addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      updateTheme();
    });
  </script>
</body>
