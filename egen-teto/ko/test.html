        ).join('');
      } else {
        btnHtml = q.a.map((txt, idx) =>
          `<button class="answer-btn" onclick="answer(${idx === 0 ? 1 : -1})">${txt}</button>`
        ).join('');
      }
      document.getElementById('quiz-card').innerHTML = `
        <div class="quiz-title">${currentQuestion + 1}. ${q.q}</div>
        <div class="answer-group">${btnHtml}</div>
      `;
      updateProgress();
    }
    function answer(score) {
      if (currentQuestion % 2 === 0) egenScore += score;
      else tetoScore += score;
      currentQuestion++;
      if (currentQuestion < totalQuestions) {
        renderQuestionCard();
      } else {
        showResult();
      }
    }
