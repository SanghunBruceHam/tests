<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>에겐 vs 테토 성향 테스트｜나의 성향과 찰떡궁합 이성 유형 찾기</title>
  <meta name="description" content="에겐녀/테토녀/에겐남/테토남, 10문항 심리테스트로 나의 성향과 잘 어울리는 이성, 추천 직업까지 확인! 공유하기/복사 기능 완비, Z세대 트렌디 심리테스트 무료." />
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="에겐 vs 테토 성향 테스트｜찰떡궁합 이상형까지!" />
  <meta property="og:description" content="10문항으로 알아보는 내 성향과 찰떡궁합 이성 유형, 추천 직업! 결과 복사/공유 기능, 모바일 최적화 심리테스트." />
  <meta property="og:image" content="https://tests.mahalohana-bruce.com/egen-teto/ko/thumbnail.png" />
  <meta property="og:url" content="https://tests.mahalohana-bruce.com/egen-teto/ko/" />
  
  <link rel="icon" href="./favicon.png" type="image/png" />
  <link rel="canonical" href="https://tests.mahalohana-bruce.com/egen-teto/ko/" />
  
  <style>
    /* 시스템 폰트 및 기본 스타일 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', 'Segoe UI', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #FFDEE9, #B5FFFC);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    
    .title {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .egen { color: #ec4899; }
    .teto { color: #3b82f6; }
    
    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 32px;
    }
    
    .icons {
      text-align: center;
      font-size: 48px;
      margin-bottom: 24px;
    }
    
    .gender-section h3 {
      text-align: center;
      font-size: 20px;
      margin-bottom: 24px;
      color: #374151;
    }
    
    .gender-option {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      margin: 12px 0;
      border: 2px solid transparent;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .gender-option.female {
      background: linear-gradient(135deg, #fce7f3, #fdf2f8);
    }
    
    .gender-option.male {
      background: linear-gradient(135deg, #dbeafe, #eff6ff);
    }
    
    .gender-option:hover {
      transform: translateY(-2px);
    }
    
    .gender-option.selected.female {
      border-color: #ec4899;
      background: #fce7f3;
    }
    
    .gender-option.selected.male {
      border-color: #3b82f6;
      background: #dbeafe;
    }
    
    .gender-icon {
      font-size: 20px;
      margin-right: 12px;
      width: 24px;
      text-align: center;
    }
    
    .gender-icon.female { color: #ec4899; }
    .gender-icon.male { color: #3b82f6; }
    
    .gender-text {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
      color: #374151;
    }
    
    .radio-button {
      width: 20px;
      height: 20px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      position: relative;
    }
    
    .gender-option.selected .radio-button {
      border-color: currentColor;
    }
    
    .gender-option.selected .radio-button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      background: currentColor;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    
    .start-button {
      width: 100%;
      padding: 16px;
      margin-top: 32px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .start-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    .start-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">
      <span class="egen">에겐</span> vs <span class="teto">테토</span> 성향 테스트
    </h1>
    <p class="subtitle">나만의 성향과 찰떡궁합 이성 유형을 찾아보세요</p>
    
    <div class="icons">💖🧠</div>
    
    <div class="gender-section">
      <h3>성별을 선택해주세요</h3>
      
      <div class="gender-option female" onclick="selectGender('female')">
        <div class="gender-icon female">♀</div>
        <div class="gender-text">여성</div>
        <div class="radio-button"></div>
      </div>
      
      <div class="gender-option male" onclick="selectGender('male')">
        <div class="gender-icon male">♂</div>
        <div class="gender-text">남성</div>
        <div class="radio-button"></div>
      </div>
      
      <button class="start-button" id="startBtn" onclick="startTest()" disabled>
        ▶ 테스트 시작하기
      </button>
    </div>
  </div>
  
  <script>
    let selectedGender = '';
    
    function selectGender(gender) {
      selectedGender = gender;
      
      // 모든 선택 해제
      document.querySelectorAll('.gender-option').forEach(option => {
        option.classList.remove('selected');
      });
      
      // 선택된 옵션 활성화
      document.querySelector('.gender-option.' + gender).classList.add('selected');
      
      // 시작 버튼 활성화
      document.getElementById('startBtn').disabled = false;
    }
    
    function startTest() {
      if (!selectedGender) return;
      
      alert('심리테스트 기능을 준비 중입니다.\n선택하신 성별: ' + (selectedGender === 'female' ? '여성' : '남성'));
    }
  </script>
</body>
</html>
