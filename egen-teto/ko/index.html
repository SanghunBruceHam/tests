      "에겐녀_테토녀": "💖💼 정반대 타입이지만 금세 친해질 수 있는 베스트 콤비!",
      "에겐녀_에겐남": "💖🎨 대화가 잘 통하고 서로를 치유할 수 있는 따뜻한 관계.",
      "에겐녀_테토남": "💖🚀 최고의 궁합! 서로의 약점을 보완하는 이상적인 커플.",
      "테토녀_에겐녀": "💼💖 타입 차이로 새로운 경험을 할 수 있는 자극적인 관계입니다.",
      "테토녀_테토녀": "💼💼 리더 기질끼리 약간 경쟁심도. 하지만 좋은 라이벌&친구!",
      "테토녀_에겐남": "💼🎨 서로를 이해하고 응원할 수 있는, 일도 취미도 맞는 궁합.",
      "테토녀_테토남": "💼🚀 열정 가득! 함께 목표를 쫓아가는 최강 태그.",
      "에겐남_에겐녀": "🎨💖 섬세함과 공감력의 콤비, 할 말이 끝이 없는 친구가 될 수 있습니다.",
      "에겐남_테토녀": "🎨💼 사교적이고 활동적인 상대에게 자극을 받을 수 있는 조합.",
      "에겐남_에겐남": "🎨🎨 취미나 관심사가 맞으면 금세 친해질 수 있는 타입.",
      "에겐남_테토남": "🎨🚀 믿을 만한 리더와 크리에이터의 최강 팀! 서로 존중할 수 있는 관계.",
      "테토남_에겐녀": "🚀💖 최고의 궁합! 상냥함과 행동력이 융합된 이상적인 커플.",
      "테토남_테토녀": "🚀💼 주도적이고 적극적인 둘! 비즈니스에서도 사생활에서도 최강 파트너.",
      "테토남_에겐남": "🚀🎨 도전과 응원의 포지티브한 에너지로 가득한 관계.",
      "테토남_테토남": "🚀🚀 뜨거운 라이벌이지만 의외로 최고의 파트너가 될 수 있습니다."
    };

    // 테스트 상태
    let currentQuestion = 0;
    let egenScore = 0;
    let tetoScore = 0;
    let userGender = '';
    let userResult = '';

    // 다크모드 토글
    function toggleTheme() {
      const body = document.body;
      const themeToggle = document.querySelector('.theme-toggle');
      
      if (body.dataset.theme === 'dark') {
        body.removeAttribute('data-theme');
        themeToggle.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        body.dataset.theme = 'dark';
        themeToggle.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    }

    // 테스트 시작
    function startTest() {
      const genderInput = document.querySelector('input[name="gender"]:checked');
      if (!genderInput) {
        alert('성별을 선택해주세요.');
        return;
      }
      
      userGender = genderInput.value;
      currentQuestion = 0;
      egenScore = 0;
      tetoScore = 0;
      
      document.getElementById('start-section').style.display = 'none';
      document.getElementById('quiz-section').style.display = 'block';
      
      showQuestion();
    }

    // 질문 표시
    function showQuestion() {
      const question = questions[currentQuestion];
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      
      document.getElementById('progress-fill').style.width = progress + '%';
      document.getElementById('progress-text').textContent = `문제 ${currentQuestion + 1}/${questions.length}`;
      document.getElementById('question-title').textContent = `${currentQuestion + 1}. ${question.question}`;
      
      const answerGroup = document.getElementById('answer-group');
      answerGroup.innerHTML = '';
      
      question.answers.forEach((answer, index) => {
        const button = document.createElement('button');
        button.className = 'answer-btn';
        button.textContent = answer;
        button.onclick = () => selectAnswer(index, question.type);
        answerGroup.appendChild(button);
      });
    }

    // 답변 선택
    function selectAnswer(answerIndex, questionType) {
      let score = 0;
      
      if (questionType === 'scale') {
        score = answerIndex - 2; // -2 ~ +2
      } else if (questionType === 'yesno') {
        score = answerIndex === 0 ? 1 : -1; // 예/아니오
      }
      
      // 짝수 번째 질문은 에겐, 홀수 번째는 테토에 점수 추가
      if (currentQuestion % 2 === 0) {
        egenScore += score;
      } else {
        tetoScore += score;
      }
      
      currentQuestion++;
      
      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    // 결과 표시
    function showResult() {
      document.getElementById('quiz-section').style.display = 'none';
      document.getElementById('result-section').style.display = 'block';
      
      // 점수 정규화
      const egenNorm = egenScore + 10;
      const tetoNorm = tetoScore + 10;
      const egenPct = Math.round((egenNorm / (egenNorm + tetoNorm)) * 100);
      
      // 결과 타입 결정
      let resultType = '';
      if (userGender === 'female') {
        resultType = egenPct > 50 ? '에겐녀' : '테토녀';
      } else {
        resultType = egenPct > 50 ? '에겐남' : '테토남';
      }
      
      userResult = resultType;
      const result = resultData[resultType];
      
      // 결과 표시
      document.getElementById('result-mascot').textContent = result.mascot;
      document.getElementById('result-title').textContent = result.title;
      document.getElementById('result-description').textContent = result.description;
      
      // 결과 배지들
      const badges = document.getElementById('result-badges');
      badges.innerHTML = `
        <div class="result-badge badge-purple">찰떡궁합: ${result.bestmatch}</div>
        <div class="result-badge badge-green">추천 직업: ${result.recommend}</div>
        <div class="result-badge badge-pink">추천 음악: ${result.music}</div>
        <div class="result-badge badge-blue">추천 영화: ${result.movie}</div>
      `;

      // GA 이벤트 추적
      if (typeof gtag !== 'undefined') {
        gtag('event', 'test_completed', {
          result_type: resultType,
          gender: userGender
        });
      }
    }

    // 궁합 체크
    function checkCompatibility() {
      const partnerType = document.getElementById('partner-type').value;
      if (!partnerType) {
        alert('상대방 타입을 선택해주세요.');
        return;
      }
      
      const compatKey = `${userResult}_${partnerType}`;
      const compatResult = compatibilityData[compatKey];
      document.getElementById('compatibility-result').textContent = compatResult || '궁합 데이터를 찾을 수 없습니다.';
    }

    // SNS 공유 함수들
    function shareTwitter() {
      const result = resultData[userResult];
      const text = `${result.mascot} ${result.title}\n${result.description}\n\n나도 테스트해보기:`;
      const url = encodeURIComponent(window.location.href);
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${url}`, '_blank');
    }

    function shareFacebook() {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
    }

    function shareThreads() {
      const result = resultData[userResult];
      const text = `${result.mascot} ${result.title}\n${result.description}\n\n`;
      const url = encodeURIComponent(window.location.href);
      window.open(`https://www.threads.net/intent/post?text=${encodeURIComponent(text + '나도 테스트해보기: ' + window.location.href)}`, '_blank');
    }

    function copyResult() {
      const result = resultData[userResult];
      const text = `${result.mascot} ${result.title}\n${result.description}\n\n찰떡궁합: ${result.bestmatch}\n추천 직업: ${result.recommend}\n추천 음악: ${result.music}\n추천 영화: ${result.movie}\n\n테스트 링크: ${window.location.href}\n\n출처: 에겐 vs 테토 성향 테스트`;
      
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          alert('결과가 복사되었습니다!');
        });
      } else {
        // 폴백: 텍스트 선택
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        alert('결과가 복사되었습니다!');
      }
    }

    // 테스트 재시작
    function restartTest() {
      document.getElementById('result-section').style.display = 'none';
      document.getElementById('start-section').style.display = 'block';
      document.querySelector('input[name="gender"]:checked').checked = false;
    }

    // 페이지 로드 시 테마 설정
    document.addEventListener('DOMContentLoaded', function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.dataset.theme = 'dark';
        document.querySelector('.theme-toggle').textContent = '☀️';
      }
      
      // 광고 로드
      (adsbygoogle = window.adsbygoogle || []).push({});
    });
  </script>
</body>
</html>
