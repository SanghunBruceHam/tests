          careers: ['의사', '변호사', '연구원'],
          lifestyle: ['운동', '자기계발', '여행'],
          music: ['인디 팝', '힙합'],
          movies: ['SF', '스릴러'],
          famous: ['손예진', '전지현', '김태희', '송혜교'],
          quotes: ['"논리가 길을 보여준다"', '"독립적인 여성이 아름답다"']
        }
      }
    };
    
    // 테스트 상태
    let selectedGender = '';
    let currentQuestion = 0;
    let answers = [];
    let egenScore = 0;
    let tetoScore = 0;
    
    function selectGender(gender) {
      selectedGender = gender;
      
      document.querySelectorAll('.gender-option').forEach(option => {
        option.classList.remove('selected');
      });
      
      document.querySelector('.gender-option.' + gender).classList.add('selected');
      document.getElementById('startBtn').disabled = false;
    }
    
    function startTest() {
      if (!selectedGender) return;
      
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('questionScreen').classList.remove('hidden');
      
      showQuestion();
    }
    
    function showQuestion() {
      const question = questions[currentQuestion];
      
      document.getElementById('questionEmoji').textContent = question.emoji;
      document.getElementById('questionTitle').textContent = question.q;
      document.getElementById('questionNumber').textContent = `질문 ${currentQuestion + 1}/10`;
      
      // 5번째 질문 후 광고 표시
      if (currentQuestion === 5) {
        const midAdContainer = document.getElementById('midAdContainer');
        midAdContainer.classList.remove('hidden');
        // AdSense 광고 로드
        try {
          (adsbygoogle = window.adsbygoogle || []).push({});
        } catch (e) {
          console.log('AdSense loading error:', e);
        }
      }
      
      const container = document.getElementById('answerContainer');
      container.innerHTML = '';
      
      if (question.type === 'yn') {
        const ynDiv = document.createElement('div');
        ynDiv.className = 'yn-options';
        
        question.options.forEach((option, index) => {
          const button = document.createElement('div');
          button.className = `yn-option ${option.type === 'egen' ? 'yes' : 'no'}`;
          button.textContent = option.text;
          button.onclick = () => selectAnswer(index);
          ynDiv.appendChild(button);
        });
        
        container.appendChild(ynDiv);
      } else {
        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'answer-options';
        
        question.options.forEach((option, index) => {
          const button = document.createElement('div');
          button.className = 'answer-option';
          button.textContent = option.text;
          button.onclick = () => selectAnswer(index);
          optionsDiv.appendChild(button);
        });
        
        container.appendChild(optionsDiv);
      }
      
      updateProgress();
      document.getElementById('nextBtn').disabled = true;
    }
    
    function selectAnswer(index) {
      const question = questions[currentQuestion];
      
      if (question.type === 'yn') {
        document.querySelectorAll('.yn-option').forEach(option => {
          option.classList.remove('selected');
        });
        document.querySelectorAll('.yn-option')[index].classList.add('selected');
      } else {
        document.querySelectorAll('.answer-option').forEach(option => {
          option.classList.remove('selected');
        });
        document.querySelectorAll('.answer-option')[index].classList.add('selected');
      }
      
      const selectedOption = question.options[index];
      answers[currentQuestion] = selectedOption;
      
      if (selectedOption.type === 'egen') {
        egenScore += selectedOption.score;
      } else if (selectedOption.type === 'teto') {
        tetoScore += selectedOption.score;
      }
      
      document.getElementById('nextBtn').disabled = false;
    }
    
    function nextQuestion() {
      currentQuestion++;
      
      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showLoading();
      }
    }
    
    function updateProgress() {
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progressBar').style.width = progress + '%';
      document.getElementById('progressText').textContent = `${currentQuestion + 1}/10`;
    }
    
    function showLoading() {
      document.getElementById('questionScreen').classList.add('hidden');
      document.getElementById('loadingScreen').classList.remove('hidden');
      
      setTimeout(() => {
        showResult();
      }, 3000);
    }
    
    function showResult() {
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');
      
      // AdSense 광고 로드
      try {
        (adsbygoogle = window.adsbygoogle || []).push({});
        (adsbygoogle = window.adsbygoogle || []).push({});
      } catch (e) {
        console.log('AdSense loading error:', e);
      }
      
      const totalScore = egenScore + tetoScore;
      const egenPercent = totalScore > 0 ? Math.round((egenScore / totalScore) * 100) : 50;
      const tetoPercent = 100 - egenPercent;
      
      const resultType = egenScore > tetoScore ? 'egen' : 'teto';
      const result = results[resultType][selectedGender];
      
      // 결과 헤더 설정
      const resultHeader = document.getElementById('resultHeader');
      resultHeader.className = `result-header ${resultType}`;
      document.getElementById('resultEmoji').textContent = result.emoji;
      document.getElementById('resultType').textContent = result.title;
      document.getElementById('resultType').className = `result-type ${resultType}`;
      document.getElementById('resultDescription').textContent = result.description;
      
      // 차트 업데이트
      setTimeout(() => {
        document.getElementById('egenBar').style.width = egenPercent + '%';
        document.getElementById('tetoBar').style.width = tetoPercent + '%';
        document.getElementById('egenPercent').textContent = egenPercent + '%';
        document.getElementById('tetoPercent').textContent = tetoPercent + '%';
      }, 500);
      
      // 결과 내용 업데이트
      document.getElementById('personalityContent').textContent = result.fullDescription;
      document.getElementById('matchContent').innerHTML = `
        <div class="match-type">${result.match}</div>
        <div>${result.matchDesc}</div>
      `;
      
      // 키워드
      const keywordsGrid = document.getElementById('keywordsGrid');
      keywordsGrid.innerHTML = result.keywords.map(keyword => 
        `<span class="keyword-tag">${keyword}</span>`
      ).join('');
      
      // 상세 정보
      document.getElementById('famousContent').innerHTML = 
        `<div class="info-list">${result.famous.map(person => `<div class="info-item">${person}</div>`).join('')}</div>`;
      
      document.getElementById('quotesContent').innerHTML = 
        `<div class="info-list">${result.quotes.map(quote => `<div class="info-item">"${quote}"</div>`).join('')}</div>`;
      
      document.getElementById('careerContent').innerHTML = 
        `<div class="info-list">${result.careers.map(career => `<div class="info-item career">${career}</div>`).join('')}</div>`;
      
      document.getElementById('lifestyleContent').innerHTML = 
        `<div class="info-list">${result.lifestyle.map(item => `<div class="info-item lifestyle">${item}</div>`).join('')}</div>`;
      
      document.getElementById('musicContent').innerHTML = 
        `<div class="info-list">${result.music.map(item => `<div class="info-item">${item}</div>`).join('')}</div>`;
      
      document.getElementById('movieContent').innerHTML = 
        `<div class="info-list">${result.movies.map(item => `<div class="info-item">${item}</div>`).join('')}</div>`;
    }
    
    function getShareText() {
      const resultType = egenScore > tetoScore ? 'egen' : 'teto';
      const result = results[resultType][selectedGender];
      
      return `🧠💖 에겐 vs 테토 성향 테스트 결과

🎯 ${result.title}
${result.fullDescription}

💕 찰떡궁합: ${result.match}
💼 추천 직업: ${result.careers.join(', ')}
🎨 라이프스타일: ${result.lifestyle.join(', ')}
🏷️ 키워드: ${result.keywords.join(', ')}

✨ 나도 테스트하기: https://tests.mahalohana-bruce.com/egen-teto/ko/`;
    }
    
    function copyResult() {
      const text = getShareText();
      
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          alert('🎉 결과가 클립보드에 복사되었습니다!\n친구들과 공유해보세요!');
        }).catch((err) => {
          console.error('클립보드 복사 실패:', err);
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }
    
    function fallbackCopy(text) {
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.style.position = 'fixed';
      textArea.style.opacity = '0';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      
      try {
        document.execCommand('copy');
        alert('🎉 결과가 클립보드에 복사되었습니다!\n친구들과 공유해보세요!');
      } catch (err) {
        console.error('복사 실패:', err);
        alert('복사 기능을 지원하지 않는 브라우저입니다.\n결과를 수동으로 복사해주세요.');
        textArea.select();
      }
      
      document.body.removeChild(textArea);
    }
    
    function shareKakao() {
      const resultType = egenScore > tetoScore ? 'egen' : 'teto';
      const result = results[resultType][selectedGender];
      const text = `나는 ${result.title}! 너도 테스트해봐~ https://tests.mahalohana-bruce.com/egen-teto/ko/`;
      
      if (navigator.share) {
        navigator.share({
          title: '에겐 vs 테토 성향 테스트',
          text: text,
          url: 'https://tests.mahalohana-bruce.com/egen-teto/ko/'
        }).catch(err => {
          console.log('공유 실패:', err);
          copyToClipboard(text);
        });
      } else {
        copyToClipboard(text);
      }
    }
    
    function shareInstagram() {
      const text = '에겐 vs 테토 성향 테스트 결과 확인! https://tests.mahalohana-bruce.com/egen-teto/ko/';
      copyToClipboard(text);
      alert('텍스트가 복사되었습니다! 인스타그램에 붙여넣기 해주세요.');
    }
    
    function shareThreads() {
      const resultType = egenScore > tetoScore ? 'egen' : 'teto';
      const result = results[resultType][selectedGender];
      const text = `나는 ${result.title}! 너도 테스트해봐~ https://tests.mahalohana-bruce.com/egen-teto/ko/`;
      
      try {
        // Threads 직접 공유 시도
        const threadsUrl = `https://threads.net/intent/post?text=${encodeURIComponent(text)}`;
        window.open(threadsUrl, '_blank', 'noopener,noreferrer');
      } catch (err) {
        // 실패시 클립보드 복사
        copyToClipboard(text);
        alert('텍스트가 복사되었습니다! Threads에 붙여넣기 해주세요.');
      }
    }
    
    function shareTwitter() {
      const resultType = egenScore > tetoScore ? 'egen' : 'teto';
      const result = results[resultType][selectedGender];
      const text = `나는 ${result.title}! 너도 테스트해봐~ https://tests.mahalohana-bruce.com/egen-teto/ko/`;
      
      try {
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
        window.open(url, '_blank', 'noopener,noreferrer');
      } catch (err) {
        copyToClipboard(text);
        alert('텍스트가 복사되었습니다! X(트위터)에 붙여넣기 해주세요.');
      }
    }
    
    function shareFacebook() {
      try {
        const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://tests.mahalohana-bruce.com/egen-teto/ko/')}`;
        window.open(url, '_blank', 'noopener,noreferrer');
      } catch (err) {
        const text = '에겐 vs 테토 성향 테스트 https://tests.mahalohana-bruce.com/egen-teto/ko/';
        copyToClipboard(text);
        alert('텍스트가 복사되었습니다! 페이스북에 붙여넣기 해주세요.');
      }
    }
    
    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(() => {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }
    
    function restartTest() {
      selectedGender = '';
      currentQuestion = 0;
      answers = [];
      egenScore = 0;
      tetoScore = 0;
      
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('startScreen').classList.remove('hidden');
      document.getElementById('midAdContainer').classList.add('hidden');
      
      document.querySelectorAll('.gender-option').forEach(option => {
        option.classList.remove('selected');
      });
      
      document.getElementById('startBtn').disabled = true;
    }
    
    function showInfo() {
      alert('에겐 vs 테토 성향 테스트는 당신의 성향을 분석하여 감성적(에겐) 또는 논리적(테토) 성향 중 어느 쪽에 더 가까운지 알아보는 심리테스트입니다. 결과를 통해 자신과 잘 맞는 이성 유형과 추천 직업까지 확인할 수 있어요!');
    }
  </script>
</body>
</html>
