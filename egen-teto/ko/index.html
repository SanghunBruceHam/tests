<body>
  <div class="container">
    <!-- 시작 화면 -->
    <div id="startScreen" class="start-screen">
      <h1>에겐 vs 테토 성향 테스트</h1>
      <p class="subtitle">
        당신의 성격과 취향을 분석해서<br>

      <div class="character-intro">

        </div>
        <div class="character-card">
          <div class="character-emoji">🎤</div>
          <div class="character-name teto-theme">테토 타입</div>
          <p>차분하고 신중한 성격</p>
        </div>
      </div>

      <!-- 성별 선택 섹션 -->
      <div class="gender-selection" style="margin: 30px 0;">
        <h3 style="font-size: 1.2rem; margin-bottom: 15px; color: #333;">성별을 선택해주세요</h3>
        <div class="gender-options" style="display: flex; gap: 15px; justify-content: center;">
          <div class="gender-option" onclick="selectGender('female')" style="flex: 1; max-width: 120px;">
            <div class="option gender-female" style="display: flex; flex-direction: column; align-items: center; padding: 20px 15px;">
              <div style="font-size: 2rem; margin-bottom: 8px;">👩</div>
              <span style="font-weight: 600;">여성</span>
            </div>
          </div>
          <div class="gender-option" onclick="selectGender('male')" style="flex: 1; max-width: 120px;">
            <div class="option gender-male" style="display: flex; flex-direction: column; align-items: center; padding: 20px 15px;">
              <div style="font-size: 2rem; margin-bottom: 8px;">👨</div>
              <span style="font-weight: 600;">남성</span>
            </div>
          </div>
        </div>
      </div>
      
      <button class="btn" id="startBtn" onclick="startTest()" disabled>테스트 시작하기</button>
      <p style="margin-top: 20px; color: #888; font-size: 0.9rem;">
        총 10개 질문 • 약 2분 소요
      </p>
    </div>

    <!-- 진행률 표시 -->
    <div id="progressContainer" class="hidden">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p style="text-align: center; color: #666;" id="progressText">질문 1 / 10</p>
    </div>

    <!-- 질문 화면 -->
    <div id="questionContainer" class="question-container hidden">
      <div class="question-number" id="questionNumber">질문 1</div>
      <div class="question-text" id="questionText"></div>
      <div id="optionsContainer"></div>
      <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>다음</button>
    </div>

    <!-- 결과 화면 -->
    <div id="resultContainer" class="result-container hidden">
      <div class="result-emoji" id="resultEmoji">🦊</div>
      <div class="result-title" id="resultTitle">에겐 타입</div>
      <div class="result-description" id="resultDescription"></div>
      
      <div class="result-details">
        <div class="detail-item">
          <div class="detail-label">💼 추천 직업</div>
          <div class="detail-content" id="resultJob"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">💕 찰떡궁합</div>
          <div class="detail-content" id="resultMatch"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">🎵 추천 음악</div>
          <div class="detail-content" id="resultMusic"></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">🎬 추천 영화</div>
          <div class="detail-content" id="resultMovie"></div>
        </div>
      </div>

      <div class="share-container">
        <button class="share-btn" onclick="copyResult()">📋 결과 복사</button>
        <button class="share-btn" onclick="shareToTwitter()">🐦 트위터 공유</button>
        <button class="share-btn" onclick="retakeTest()">🔄 다시 하기</button>
      </div>
    </div>
  </div>

  <script>
    // 테스트 질문 데이터
    const questions = [
      {
        question: "새로운 사람들과의 모임에서 당신은?",
        options: [
          { text: "먼저 다가가서 대화를 시작한다", type: "egen" },
          { text: "누군가 말을 걸어올 때까지 기다린다", type: "teto" }
        ]
      },
      {
        question: "스트레스를 받을 때 당신의 해소법은?",
        options: [
          { text: "친구들과 만나서 수다를 떤다", type: "egen" },
          { text: "혼자 조용한 시간을 갖는다", type: "teto" }
        ]
      },
      {
        question: "계획을 세울 때 당신은?",
        options: [
          { text: "대략적인 계획만 세우고 즉흥적으로 행동한다", type: "egen" },
          { text: "세세한 부분까지 꼼꼼히 계획한다", type: "teto" }
        ]
      },
      {
        question: "새로운 도전 앞에서 당신은?",
        options: [
          { text: "일단 해보고 생각한다", type: "egen" },
          { text: "충분히 고민하고 준비한 후 시작한다", type: "teto" }
        ]
      },
      {
        question: "친구와의 약속 시간에 대해",
        options: [
          { text: "대충 맞춰가면 된다고 생각한다", type: "egen" },
          { text: "정확한 시간을 지키려고 노력한다", type: "teto" }
        ]
      },
      {
        question: "주말을 보내는 이상적인 방법은?",
        options: [
          { text: "친구들과 활동적인 외출", type: "egen" },
          { text: "집에서 여유롭게 취미 생활", type: "teto" }
        ]
      },
      {
        question: "의견 충돌이 있을 때 당신은?",
        options: [
          { text: "직접적으로 의견을 표현한다", type: "egen" },
          { text: "상대방 입장을 먼저 이해하려 한다", type: "teto" }
        ]
      },
      {
        question: "새로운 환경에 적응할 때",
        options: [
          { text: "빠르게 적응하고 새로운 것들을 시도한다", type: "egen" },
          { text: "천천히 관찰하며 조심스럽게 적응한다", type: "teto" }
        ]
      },
      {
        question: "팀 프로젝트에서 당신의 역할은?",
        options: [
          { text: "아이디어를 제시하고 추진력을 발휘한다", type: "egen" },
          { text: "세심하게 검토하고 완성도를 높인다", type: "teto" }
        ]
      },
      {
        question: "감정 표현에 대한 당신의 성향은?",
        options: [
          { text: "감정을 솔직하게 표현하는 편이다", type: "egen" },
          { text: "감정을 내면에 간직하는 편이다", type: "teto" }
        ]
      }
    ];

    // 결과 데이터
    const results = {
      '에겐녀': {
        emoji: "💖",
        title: '매력 넘치는 에겐녀',
        description: `사교적이고 활발한 성격으로 주변 사람들에게 에너지를 주는 "분위기 메이커" 타입！`,
        job: '마케터, 방송인, 이벤트 플래너',
        match: '테토남 🚀（리더십 있는 남성）',
        music: ["aespa「Spicy」", "NewJeans「Get Up」"],
        movie: ["라라랜드", "어벤져스"],
        color: '#ff7eb3'
      },
      '테토녀': {
        emoji: "💼",
        title: '똑똑한 테토녀',
        description: `신중하고 계획적인 성격으로 목표를 차근차근 달성해나가는 "차분한 실력자" 타입！`,
        job: '기획자, 연구원, 컨설턴트',
        match: '에겐남 🎨（감성적인 남성）',
        music: ["IU「Love wins all」", "태연「INVU」"],
        movie: ["기생충", "미나리"],
        color: '#8ac6ff'
      },
      '에겐남': {
        emoji: "🎨",
        title: '감성 풍부한 에겐남',
        description: `자신만의 세계관을 소중히 여기고 창의적인 생각을 하는 "개성파 아티스트" 타입！`,
        job: '크리에이터, 디자이너, 작가',
        match: '테토녀 💼（계획적인 여성）',
        music: ["BTS「Spring Day」", "IU「Through the Night」"],
        movie: ["너의 이름은", "월-E"],
        color: '#ff7eb3'
      },
      '테토남': {
        emoji: "🚀",
        title: '리더십 있는 테토남',
        description: `친구들로부터 신뢰받으며 새로운 도전을 두려워하지 않는 "카리스마 리더" 타입！`,
        job: '스타트업 대표, 영업팀장, 프로젝트 매니저',
        match: '에겐녀 💖（활발한 여성）',
        music: ["BTS「Dynamite」", "BLACKPINK「How You Like That」"],
        movie: ["인터스텔라", "탑건: 매버릭"],
        color: '#8ac6ff'
      }
    };

    let currentQuestion = 0;
    let answers = [];
    let selectedGender = '';

    function selectGender(gender) {
      selectedGender = gender;
      
      // 이전 선택 제거
      document.querySelectorAll('.gender-option .option').forEach(opt => {
        opt.classList.remove('selected');
      });
      
      // 현재 선택 표시
      document.querySelector(`.gender-${gender}`).classList.add('selected');
      
      // 시작 버튼 활성화
      document.getElementById('startBtn').disabled = false;
    }

    function startTest() {
      if (!selectedGender) {
        alert('성별을 선택해주세요!');
        return;
      }
      
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('progressContainer').classList.remove('hidden');
      document.getElementById('questionContainer').classList.remove('hidden');
      showQuestion();
    }

    function showQuestion() {
      const question = questions[currentQuestion];
      document.getElementById('questionNumber').textContent = `질문 ${currentQuestion + 1}`;
      document.getElementById('questionText').textContent = question.question;
      
      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      
      question.options.forEach((option, index) => {
        const optionDiv = document.createElement('div');
        optionDiv.className = 'option';
        optionDiv.textContent = option.text;
        optionDiv.onclick = () => selectOption(index, optionDiv);
        container.appendChild(optionDiv);
      });

      updateProgress();
      document.getElementById('nextBtn').disabled = true;
    }

    function selectOption(index, element) {
      // 이전 선택 제거
      document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
      
      // 현재 선택 표시
      element.classList.add('selected');
      
      // 답변 저장
      answers[currentQuestion] = questions[currentQuestion].options[index].type;
      
      // 다음 버튼 활성화
      document.getElementById('nextBtn').disabled = false;
    }

    function nextQuestion() {
      currentQuestion++;
      
      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function updateProgress() {
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('progressText').textContent = `질문 ${currentQuestion + 1} / ${questions.length}`;
    }

    function showResult() {
      // 답변 집계
      const count = { egen: 0, teto: 0 };
      answers.forEach(answer => count[answer]++);
      
      // 성별에 따른 결과
      const isEgen = count.egen > count.teto;
      const gender = selectedGender === 'female' ? '녀' : '남';
      const resultType = (isEgen ? '에겐' : '테토') + gender;
      
      const result = results[resultType];
      
      // 화면 전환
      document.getElementById('progressContainer').classList.add('hidden');
      document.getElementById('questionContainer').classList.add('hidden');
      document.getElementById('resultContainer').classList.remove('hidden');
      
      // 결과 표시
      document.getElementById('resultEmoji').textContent = result.emoji;
      document.getElementById('resultTitle').textContent = result.title;
      document.getElementById('resultDescription').textContent = result.description;
      document.getElementById('resultJob').textContent = result.job;
      document.getElementById('resultMatch').textContent = result.match;
      document.getElementById('resultMusic').textContent = result.music.join(', ');
      document.getElementById('resultMovie').textContent = result.movie.join(', ');
    }

    function copyResult() {
      const title = document.getElementById('resultTitle').textContent;
      const description = document.getElementById('resultDescription').textContent;
      const text = `나는 ${title}!\n\n${description}\n\n에겐 vs 테토 성향 테스트 결과를 확인해보세요!\n${window.location.href}`;
      
      navigator.clipboard.writeText(text).then(() => {
        alert('결과가 클립보드에 복사되었습니다!');
      });
    }

    function shareToTwitter() {
      const title = document.getElementById('resultTitle').textContent;
      const text = `나는 ${title}! 에겐 vs 테토 성향 테스트 결과를 확인해보세요!`;
      const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`;
      window.open(url, '_blank');
    }

    function retakeTest() {
      currentQuestion = 0;
      answers = [];
      selectedGender = '';
      
      // 성별 선택 초기화
      document.querySelectorAll('.gender-option .option').forEach(opt => {
        opt.classList.remove('selected');
      });
      document.getElementById('startBtn').disabled = true;
      
      document.getElementById('resultContainer').classList.add('hidden');
      document.getElementById('startScreen').classList.remove('hidden');
    }
  </script>
</body>
</html>
