<body>

  <script>
    // 질문 은행 (5점 척도 + 예/아니오형 혼합, 30개 샘플)
    const questionBank = [
      {type:'scale', q:"다른 사람의 감정에 잘 공감하는 편이다."},
      {type:'scale', q:"혼자만의 시간이 필요하다."},

      {type:'scale', q:"감정을 솔직하게 표현한다."},
      {type:'scale', q:"타인의 도움을 자주 요청한다."},
      {type:'scale', q:"리더 역할을 맡는 걸 즐긴다."},
      {type:'scale', q:"결정을 내릴 때 신중한 편이다."},
      {type:'scale', q:"목표를 이루기 위해 끈기있게 노력한다."},
      {type:'scale', q:"감정에 쉽게 흔들린다."},
      {type:'yn', q:"내향적인 편이다."},
      {type:'yn', q:"문제가 생기면 즉시 행동에 옮긴다."},
      {type:'yn', q:"감성적인 예술, 음악, 그림을 좋아한다."},
      {type:'yn', q:"사람들과 협력하는 것을 즐긴다."},
      {type:'yn', q:"스스로 동기부여가 잘 된다."},
      {type:'yn', q:"감정보다 논리를 더 중시한다."},
      {type:'yn', q:"위기 상황에서도 침착하다."},
      {type:'yn', q:"타인의 기대에 부응하려 노력한다."},
      {type:'yn', q:"즉흥적으로 여행을 떠나는 걸 좋아한다."},
      {type:'yn', q:"감정이 얼굴에 잘 드러난다."},
      {type:'yn', q:"친구에게 조언해주는 걸 좋아한다."},
      {type:'yn', q:"긴장감 있는 상황에서 실력이 더 나온다."},
      {type:'yn', q:"사람들 앞에서 발표하는 걸 두려워하지 않는다."},
      {type:'yn', q:"혼자서 하는 취미를 여러 개 갖고 있다."},
      {type:'yn', q:"목표를 달성했을 때 스스로를 칭찬한다."},
      {type:'yn', q:"새로운 친구 사귀는 걸 좋아한다."},
      {type:'yn', q:"실수해도 금방 회복하는 편이다."},
      {type:'yn', q:"누군가의 고민을 들어주는 게 어렵지 않다."},
      {type:'yn', q:"내가 세운 계획은 꼭 지키는 편이다."},
    ];
    let currentQuestion = 0;
    let egenScore = 0;
    let tetoScore = 0;
    const totalQuestions = 10;
    let pickedQuestions = [];

    // 결과 맵 (마스코트/추천/테마 컬러/추천콘텐츠 샘플)
    const resultMap = {
      '에겐녀': {
        mascot: "💖",
        title: '감성 공감력 높은 에겐녀',
        description: '따뜻하고 섬세하며 감정에 깊이 공감하는 성향. 주변을 포용하며 리더십도 자연스럽게 발휘하는 타입이에요.',
        recommend: '추천 직업: 상담가, 디자이너, 콘텐츠 기획자',
        bestmatch: '잘 어울리는 이성: 테토남 🚀',
        entertain: '추천 음악: IU - Love Poem<br>추천 영화: <b>인사이드 아웃</b>',
        color: '#ff7eb3'
      },
      '테토녀': {
        mascot: "💼",
        title: '카리스마 넘치는 테토녀',
        description: '실행력과 추진력이 강하고 전략적으로 상황을 돌파하는 스타일. 단호하지만, 주변의 조율도 잘 해요.',
        recommend: '추천 직업: CEO, 변호사, 기획자',
        bestmatch: '잘 어울리는 이성: 에겐남 🎨',
        entertain: '추천 음악: NewJeans - Super Shy<br>추천 영화: <b>킹스맨</b>',
        color: '#8ac6ff'
      },
      '에겐남': {
        mascot: "🎨",
        title: '감성적인 에겐남',
        description: '예술적 감성과 공감 능력이 뛰어나며 창의력과 배려심을 함께 갖춘 타입입니다.',
        recommend: '추천 직업: 작가, 예술가, 심리상담사',
        bestmatch: '잘 어울리는 이성: 테토녀 💼',
        entertain: '추천 음악: 폴킴 - 모든 날, 모든 순간<br>추천 영화: <b>라라랜드</b>',
        color: '#ff7eb3'
      },
      '테토남': {
        mascot: "🚀",
        title: '리더십 넘치는 테토남',
        description: '전략적이고 책임감이 강하며 문제 해결 능력이 탁월합니다. 주변에 에너지를 불어넣는 존재!',
        recommend: '추천 직업: 창업가, 마케터, 군인',
        bestmatch: '잘 어울리는 이성: 에겐녀 💖',
        entertain: '추천 음악: 방탄소년단 - FIRE<br>추천 영화: <b>머니볼</b>',
        color: '#8ac6ff'
      }
    };

    function shuffle(arr) {
      let a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function renderQuestions() {
      pickedQuestions = shuffle(questionBank).slice(0, totalQuestions);
      let html = '';
      pickedQuestions.forEach((q, idx) => {
        if(q.type === 'scale') {
          html += `<div class="question" id="q${idx+1}"><p>${idx+1}. ${q.q}</p>
            <div class="scale-btns">
              <button onclick="answer(${idx+1}, 2)">매우 그렇다</button>
              <button onclick="answer(${idx+1}, 1)">약간 그렇다</button>
              <button onclick="answer(${idx+1}, 0)">중간</button>
              <button onclick="answer(${idx+1}, -1)">약간 아니다</button>
              <button onclick="answer(${idx+1}, -2)">전혀 아니다</button>
            </div>
          </div>`;
        } else {
          html += `<div class="question" id="q${idx+1}"><p>${idx+1}. ${q.q}</p>
            <div class="answer-btns">
              <button onclick="answer(${idx+1}, 1)">예</button>
              <button onclick="answer(${idx+1}, -1)">아니오</button>
            </div>
          </div>`;
        }
      });
      document.getElementById('dynamic-questions').innerHTML = html;
    }

    function updateProgress() {
      document.getElementById("progress-bar").style.width = (currentQuestion / totalQuestions) * 100 + "%";
    }

    function nextQuestion() {
      if (currentQuestion === 0) {
        const gender = document.querySelector('input[name="gender"]:checked');
        if (!gender) {
          alert("성별을 선택해주세요.");
          return;
        }
        document.getElementById("q0").classList.remove("active");
        document.getElementById("q1").classList.add("active");
        currentQuestion++;
        updateProgress();
        return;
      }
    }

    function answer(qIdx, score) {
      // type, 에겐/테토 배분 예시 (scale, yn, 랜덤 50:50)
      const qObj = pickedQuestions[qIdx-1];
      // QID가 짝수면 에겐, 홀수면 테토… 실제는 질문마다 분류 다르게 해도 됨
      if ((qIdx-1) % 2 === 0) {
        egenScore += score;
      } else {
        tetoScore += score;
      }
      // 현재 질문 숨기고 다음 질문 보이기
      document.getElementById(`q${qIdx}`).classList.remove("active");
      if (qIdx < totalQuestions) {
        document.getElementById(`q${qIdx+1}`).classList.add("active");
        currentQuestion++;
        updateProgress();
      } else {
        showResult();
      }
    }

    function showResult() {
      // 점수 normalize
      const egenNorm = egenScore + 10; // 대략 -10~+10 → 0~20
      const tetoNorm = tetoScore + 10;
      const egenPct = Math.max(0, Math.min(100, Math.round((egenNorm / (egenNorm + tetoNorm)) * 100)));
      const tetoPct = 100 - egenPct;

      const gender = document.querySelector('input[name="gender"]:checked');
      let resultType;
      if (!gender) return;
      if (gender.value === "female") {
        resultType = egenPct > tetoPct ? "에겐녀" : "테토녀";
      } else {
        resultType = egenPct > tetoPct ? "에겐남" : "테토남";
      }
      const result = resultMap[resultType];

      // 컬러 테마
      document.getElementById("result-title").innerText = result.title;
      document.getElementById("result-mascot").innerText = result.mascot;
      document.getElementById("result-description").innerText = result.description;
      document.getElementById("result-bestmatch").innerText = result.bestmatch;
      document.getElementById("result-recommendation").innerText = result.recommend;
      document.getElementById("result-entertain").innerHTML = result.entertain;

      // 점수 그래프
      document.getElementById("score-graph").innerHTML =
        `<div class="score-bar"><span class="score-label">에겐</span>
          <div class="bar-bg"><div class="bar-egen" style="width:${egenPct}%;"></div></div>
          <span class="bar-score">${egenPct}%</span>
        </div>
        <div class="score-bar"><span class="score-label">테토</span>
          <div class="bar-bg"><div class="bar-teto" style="width:${tetoPct}%;"></div></div>
          <span class="bar-score">${tetoPct}%</span>
        </div>`;

      document.getElementById("test").style.display = "none";
      document.getElementById("result").style.display = "block";
    }

    function shareResult(platform) {
      const title = document.getElementById("result-title")?.innerText || "";
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent(title + ' - 나도 테스트!');
      if (platform === "twitter") {
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
      } else if (platform === "facebook") {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
      } else if (platform === "threads") {
        window.open(`https://www.threads.net/intent/post?text=${text}%20${url}`, '_blank');
      }
    }
    function copyResult() {
      const title = document.getElementById("result-title")?.innerText || "";
      const mascot = document.getElementById("result-mascot")?.innerText || "";
      const description = document.getElementById("result-description")?.innerText || "";
      const bestmatch = document.getElementById("result-bestmatch")?.innerText || "";
      const recommendation = document.getElementById("result-recommendation")?.innerText || "";
      const entertain = document.getElementById("result-entertain")?.innerText || "";
      const link = window.location.href;
      const source = "\n\n출처: 에겐 vs 테토 성향 테스트 (tests.mahalohana-bruce.com/egen-teto/ko/index.html)";
      const text = `${mascot} ${title}\n${description}\n${bestmatch}\n${recommendation}\n${entertain}\n테스트 바로가기: ${link}${source}`;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
          alert("결과가 복사되었습니다!");
        }, function() {
          alert("복사에 실패했습니다. 다시 시도해 주세요.");
        });
      } else {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("결과가 복사되었습니다!");
      }
    }

    // 진입 시 동적 질문 생성
    renderQuestions();

    // 광고/추적코드 등(생략: 이전과 동일하게 하위에 삽입)
  </script>
</body>
</html>
