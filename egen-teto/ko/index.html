      <script>
      // React Router 경로 수정 - 목표 경로 유지
      // 목표 경로에서 직접 작동하므로 리다이렉트 불필요
    </script>
    <script>
      // FontAwesome 로딩 확인 및 fallback
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          // FontAwesome이 로드되지 않은 경우 텍스트 아이콘으로 대체
          const fasIcons = document.querySelectorAll('.fas');
          fasIcons.forEach(function(icon) {
            if (window.getComputedStyle(icon, ':before').content === "none" || 
                window.getComputedStyle(icon, ':before').content === '""') {
              
              // 아이콘별 텍스트 대체
              if (icon.classList.contains('fa-venus')) {
                icon.innerHTML = '♀';
                icon.className = 'gender-icon female';
              } else if (icon.classList.contains('fa-mars')) {
                icon.innerHTML = '♂';
                icon.className = 'gender-icon male';
              } else if (icon.classList.contains('fa-play')) {
                icon.innerHTML = '▶';
                icon.className = 'play-icon';
              }
            }
          });
        }, 1000);
      });
    </script>
    <style>
      .gender-icon {
        font-size: 1.25rem !important;
        font-weight: bold !important;
        display: inline-block !important;
        text-align: center !important;
        min-width: 1.25rem !important;
      }
      .gender-icon.female {
        color: #ec4899 !important;
      }
      .gender-icon.male {
        color: #3b82f6 !important;
      }
      .play-icon {
        font-size: 0.875rem !important;
        display: inline-block !important;
        text-align: center !important;
        min-width: 0.875rem !important;
      }
    </style>
    <script>
      // React Router 경로 처리 - index.html 지원
      window.addEventListener('DOMContentLoaded', function() {
        // 현재 경로가 index.html인 경우 React Router가 올바르게 처리하도록 설정
        if (window.location.pathname.endsWith('/index.html')) {
          // 브라우저 히스토리 API로 React Router 친화적 경로로 변경
          const newPath = window.location.pathname.replace('/index.html', '/');
          window.history.replaceState({}, '', newPath + window.location.search + window.location.hash);
          
          // React 앱이 로드된 후 강제로 라우터 업데이트
          setTimeout(function() {
            if (window.React && window.ReactDOM) {
              // React 앱 강제 리렌더
              const event = new PopStateEvent('popstate');
              window.dispatchEvent(event);
            }
          }, 100);
        }
      });
    </script>
    <script>
      // React 앱 강제 렌더링 - Router 우회
      window.addEventListener('DOMContentLoaded', function() {
        // React 앱이 로드되기를 기다린 후 강제로 PersonalityTest 컴포넌트 표시
        function forceRenderApp() {
          const rootElement = document.getElementById('root');
          if (rootElement && rootElement.innerHTML.includes('404 Page Not Found')) {
            console.log('404 감지, 앱 강제 렌더링 시도');
            
            // 페이지 새로고침으로 React 앱 재시작
            setTimeout(function() {
              window.location.reload();
            }, 1000);
          }
        }
        
        // 1초 후 확인
        setTimeout(forceRenderApp, 1000);
        
        // 3초 후 재확인
        setTimeout(forceRenderApp, 3000);
        
        // 히스토리 이벤트 리스너 추가
        window.addEventListener('popstate', function() {
          setTimeout(forceRenderApp, 500);
        });
      });
      
      // URL 경로 정규화
      if (window.location.pathname.endsWith('/index.html')) {
        const newPath = window.location.pathname.replace('/index.html', '/');
        window.history.replaceState({}, '', newPath);
      }
    </script>
