  <style>
    /* 기본 리셋 및 폰트 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
      position: relative;
    }
    
    /* 배경 애니메이션 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #fecca7, #ff9a9e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: -2;
    }
    
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd"><circle fill="%23ffffff" fill-opacity="0.05" cx="30" cy="30" r="2"/></g></svg>');
      z-index: -1;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .container {
      max-width: 450px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 40px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      width: 100%;
      animation: slideUp 0.8s ease-out;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 타이틀 섹션 */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(45deg, #ff6b9d, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }
    
    .subtitle {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    
    .mascot {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
      animation: bounce 2s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }
    
    .info-badge {
      display: inline-flex;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .info-badge::before {
      content: 'ℹ';
      margin-right: 6px;
      font-size: 16px;
    }
    
    /* 성별 선택 */
    .gender-section h3 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 30px;
      color: #1e293b;
    }
    
    .gender-options {
      display: grid;
      gap: 16px;
      margin-bottom: 30px;
    }
    
    .gender-option {
      display: flex;
      align-items: center;
      padding: 20px;
      border: 3px solid transparent;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .gender-option::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .gender-option:hover::before {
      opacity: 1;
    }
    
    .gender-option.female {
      background: linear-gradient(135deg, #fce7f3, #fbcfe8);
      border-color: transparent;
    }
    
    .gender-option.male {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      border-color: transparent;
    }
    
    .gender-option:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }
    
    .gender-option.selected.female {
      border-color: #ec4899;
      background: linear-gradient(135deg, #ec4899, #f472b6);
      color: white;
      box-shadow: 0 20px 40px rgba(236, 72, 153, 0.3);
    }
    
    .gender-option.selected.male {
      border-color: #3b82f6;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: white;
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
    }
    
    .gender-icon {
      font-size: 24px;
      margin-right: 16px;
      width: 32px;
      text-align: center;
      transition: transform 0.3s ease;
    }
    
    .gender-option:hover .gender-icon {
      transform: scale(1.2);
    }
    
    .gender-text {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
    }
    
    .radio-indicator {
      width: 24px;
      height: 24px;
      border: 3px solid currentColor;
      border-radius: 50%;
      position: relative;
      transition: all 0.3s ease;
    }
    
    .gender-option.selected .radio-indicator::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      background: currentColor;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(1);
      animation: checkPop 0.3s ease;
    }
    
    @keyframes checkPop {
      0% { transform: translate(-50%, -50%) scale(0); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
    
    /* 진행률 바 */
    .progress-section {
      margin-bottom: 30px;
    }
    
    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e2e8f0;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ec4899, #8b5cf6, #3b82f6);
      border-radius: 6px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 1.5s ease-in-out infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    
    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 14px;
      color: #64748b;
      font-weight: 500;
    }
    
    /* 질문 섹션 */
    .question-section {
      text-align: center;
    }
    
    .question-number {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .question-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 30px;
      line-height: 1.4;
      color: #1e293b;
    }
    
    .answer-options {
      display: grid;
      gap: 12px;
      margin-bottom: 30px;
    }
    
    .answer-option {
      padding: 18px 20px;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 15px;
      line-height: 1.5;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    
    .answer-option::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s ease;
    }
    
    .answer-option:hover {
      border-color: #8b5cf6;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    
    .answer-option:hover::before {
      left: 100%;
    }
    
    .answer-option.selected {
      border-color: #8b5cf6;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(139, 92, 246, 0.3);
    }
    
    /* 버튼 스타일 */
    .btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(236, 72, 153, 0.4);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .btn:hover::before {
      left: 100%;
    }
    
    /* 결과 화면 */
    .result-section {
      text-align: center;
    }
    
    .result-header {
      margin-bottom: 30px;
    }
    
    .result-badge {
      display: inline-block;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
    }
    
    .result-badge.egen {
      background: linear-gradient(135deg, #ec4899, #f472b6);
      color: white;
      box-shadow: 0 20px 40px rgba(236, 72, 153, 0.3);
    }
    
    .result-badge.teto {
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: white;
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
    }
    
    .result-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 15px;
      color: #1e293b;
    }
    
    .result-content {
      display: grid;
      gap: 24px;
      margin-bottom: 30px;
    }
    
    .result-card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 24px;
      text-align: left;
      border: 2px solid #e2e8f0;
      transition: all 0.3s ease;
    }
    
    .result-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      border-color: #8b5cf6;
    }
    
    .result-card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1e293b;
      display: flex;
      align-items: center;
    }
    
    .result-card-title::before {
      margin-right: 8px;
      font-size: 20px;
    }
    
    .result-card-title.personality::before { content: '🎭'; }
    .result-card-title.match::before { content: '💕'; }
    .result-card-title.career::before { content: '💼'; }
    .result-card-title.lifestyle::before { content: '🎨'; }
    .result-card-title.famous::before { content: '⭐'; }
    .result-card-title.keywords::before { content: '🏷️'; }
    
    .result-card-content {
      color: #475569;
      line-height: 1.6;
    }
    
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    
    .tag {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
    }
    
    .share-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 30px;
    }
    
    .share-btn {
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 16px;
    }
    
    .share-btn.copy {
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
    }
    
    .share-btn.restart {
      background: #e2e8f0;
      color: #475569;
    }
    
    .share-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    /* 반응형 */
    @media (max-width: 480px) {
      .container { padding: 15px; }
      .card { padding: 30px 25px; }
      .title { font-size: 28px; }
      .question-title { font-size: 20px; }
      .share-section { grid-template-columns: 1fr; }
    }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- 시작 화면 -->
      <div id="startScreen">
        <div class="header">
          <div class="mascot">🧠💖</div>
          <h1 class="title">에겐 vs 테토 성향 테스트</h1>
          <p class="subtitle">나만의 성향과 찰떡궁합 이성 유형을 찾아보세요</p>
          <div class="info-badge">에겐 vs 테토 성향 테스트란?</div>
        </div>
        
        <div class="gender-section">
          <h3>성별을 선택해주세요</h3>
          
          <div class="gender-options">
            <div class="gender-option female" onclick="selectGender('female')">
              <div class="gender-icon">👩</div>
              <div class="gender-text">여성</div>
              <div class="radio-indicator"></div>
            </div>
            
            <div class="gender-option male" onclick="selectGender('male')">
              <div class="gender-icon">👨</div>
              <div class="gender-text">남성</div>
              <div class="radio-indicator"></div>
            </div>
          </div>
          
          <button class="btn btn-primary" id="startBtn" onclick="startTest()" disabled>
            🚀 테스트 시작하기
          </button>
        </div>
      </div>
      
      <!-- 질문 화면 -->
      <div id="questionScreen" class="hidden">
        <div class="progress-section">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-text">
            <span>시작</span>
            <span id="progressText">1/10</span>
            <span>완료</span>
          </div>
        </div>
        
        <div class="question-section">
          <div class="question-number" id="questionNumber">질문 1/10</div>
          <h2 class="question-title" id="questionTitle"></h2>
          <div class="answer-options" id="answerOptions"></div>
          <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>다음 질문</button>
        </div>
      </div>
      
      <!-- 결과 화면 -->
      <div id="resultScreen" class="hidden">
        <div class="result-section">
          <div class="result-header">
            <div class="result-badge" id="resultBadge"></div>
            <h2 class="result-title" id="resultTitle"></h2>
          </div>
          
          <div class="result-content" id="resultContent">
            <!-- 결과 카드들이 여기에 동적으로 삽입됩니다 -->
          </div>
          
          <div class="share-section">
            <button class="share-btn copy" onclick="copyResult()">📋 결과 복사</button>
            <button class="share-btn restart" onclick="restartTest()">🔄 다시 하기</button>
          </div>
        </div>
      </div>
    </div>
  </div>

      },
      {
        q: "스트레스를 받을 때 당신의 해소법은?",

          { text: "📋 미리 자세한 계획을 세운다", type: "teto", score: 2 },
          { text: "📝 대략적인 계획만 세운다", type: "neutral", score: 1 }
        ]
      },
      {
        q: "업무나 과제를 할 때 당신의 스타일은?",
        options: [

    function selectGender(gender) {
      selectedGender = gender;
      
      document.querySelectorAll('.gender-option').forEach(option => {
        option.classList.remove('selected');
      });
      
      document.querySelector('.gender-option.' + gender).classList.add('selected');
      document.getElementById('startBtn').disabled = false;
    }
    
    function startTest() {
      if (!selectedGender) return;
      
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('questionScreen').classList.remove('hidden');
      
      showQuestion();
    }
    
    function showQuestion() {
      const question = questions[currentQuestion];
      document.getElementById('questionTitle').textContent = question.q;
      document.getElementById('questionNumber').textContent = `질문 ${currentQuestion + 1}/10`;
      
      const optionsContainer = document.getElementById('answerOptions');
      optionsContainer.innerHTML = '';
      
      question.options.forEach((option, index) => {
        const button = document.createElement('div');
        button.className = 'answer-option';
        button.textContent = option.text;
        button.onclick = () => selectAnswer(index);
        optionsContainer.appendChild(button);
      });
      
      updateProgress();
      document.getElementById('nextBtn').disabled = true;
    }
    
    function selectAnswer(index) {
      document.querySelectorAll('.answer-option').forEach(option => {
        option.classList.remove('selected');
      });
      
      document.querySelectorAll('.answer-option')[index].classList.add('selected');
      
      const selectedOption = questions[currentQuestion].options[index];
      answers[currentQuestion] = selectedOption;
      
      if (selectedOption.type === 'egen') {
        egenScore += selectedOption.score;
      } else if (selectedOption.type === 'teto') {
        tetoScore += selectedOption.score;
      }
      
      document.getElementById('nextBtn').disabled = false;
    }
    
    function nextQuestion() {
      currentQuestion++;
      
      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }
    
    function updateProgress() {
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('progressText').textContent = `${currentQuestion + 1}/10`;
    }
    
    function showResult() {
      document.getElementById('questionScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');
