  <script>
    // 모바일 경험 개선 변수
    let touchStartX = 0;
    let touchEndX = 0;
    let isFullscreen = false;
    
    // 햅틱 피드백 함수
    function hapticFeedback(type = 'light') {
      if ('vibrate' in navigator) {
        switch(type) {
          case 'light':
            navigator.vibrate(10);
            break;
          case 'medium':
            navigator.vibrate(50);
            break;
          case 'heavy':
            navigator.vibrate([100, 30, 100]);
            break;
          case 'success':
            navigator.vibrate([50, 50, 50]);
            break;
        }
      }
    }

    // 풀스크린 토글
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => {
          isFullscreen = true;
          hapticFeedback('medium');
          updateFullscreenButton();
        }).catch(err => {
          console.log(`풀스크린 오류: ${err.message}`);
        });
      } else {
        document.exitFullscreen().then(() => {
          isFullscreen = false;
          hapticFeedback('light');
          updateFullscreenButton();
        });
      }
    }

    // 풀스크린 버튼 업데이트
    function updateFullscreenButton() {
      const btn = document.getElementById('fullscreenBtn');
      if (btn) {
        btn.innerHTML = isFullscreen ? '🔳 나가기' : '📱 풀스크린';
      }
    }

    // 스와이프 감지
    function handleTouchStart(e) {
      touchStartX = e.changedTouches[0].screenX;
    }

    function handleTouchEnd(e) {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }

    function handleSwipe() {
      const swipeThreshold = 50;
      const swipeDistance = touchEndX - touchStartX;
      
      // 질문 화면에서만 스와이프 활성화
      if (!document.getElementById('questionScreen').classList.contains('hidden')) {
        if (Math.abs(swipeDistance) > swipeThreshold) {
          if (swipeDistance > 0) {
            // 오른쪽 스와이프 - 이전 질문 (현재는 비활성화)
            hapticFeedback('light');
          } else {
            // 왼쪽 스와이프 - 다음 질문
            if (!document.getElementById('nextBtn').disabled) {
              hapticFeedback('medium');
              nextQuestion();
            } else {
              hapticFeedback('light');
            }
          }
        }
      }
    }

    // 테스트 질문 데이터
    const questions = [

      },
      {

        options: [
          { text: "대충 맞춰가면 된다고 생각한다", type: "egen" },
          { text: "정확한 시간을 지키려고 노력한다", type: "teto" }
        ]
      },
      {
        question: "주말을 보내는 이상적인 방법은?",
        options: [
          { text: "친구들과 활동적인 외출", type: "egen" },
          { text: "집에서 여유롭게 취미 생활", type: "teto" }
        ]
      },
      {
        question: "의견 충돌이 있을 때 당신은?",
        options: [
          { text: "직접적으로 의견을 표현한다", type: "egen" },
          { text: "상대방 입장을 먼저 이해하려 한다", type: "teto" }
        ]
      },
      {
        question: "새로운 환경에 적응할 때",
        options: [
          { text: "빠르게 적응하고 새로운 것들을 시도한다", type: "egen" },
          { text: "천천히 관찰하며 조심스럽게 적응한다", type: "teto" }
        ]
      },
      {
        question: "팀 프로젝트에서 당신의 역할은?",
        options: [
          { text: "아이디어를 제시하고 추진력을 발휘한다", type: "egen" },
          { text: "세심하게 검토하고 완성도를 높인다", type: "teto" }
        ]
      },
      {
        question: "감정 표현에 대한 당신의 성향은?",
        options: [
          { text: "감정을 솔직하게 표현하는 편이다", type: "egen" },
          { text: "감정을 내면에 간직하는 편이다", type: "teto" }
        ]
      }
    ];

    // 결과 데이터
    const results = {
      '에겐녀': {
        emoji: "💖",
        title: '매력 넘치는 에겐녀',
        description: `사교적이고 활발한 성격으로 주변 사람들에게 에너지를 주는 "분위기 메이커" 타입！`,
        job: '마케터, 방송인, 이벤트 플래너, 디자이너',
        match: '테토남 🚀（차분하고 계획적인 남성）',
        music: ["aespa「Spicy」", "NewJeans「Get Up」", "IVE「LOVE DIVE」"],
        movie: ["라라랜드", "어벤져스", "인사이드 아웃"],
        color: '#ff7eb3'
      },
      '테토녀': {
        emoji: "🧠",
        title: '똑똑한 테토녀',
        description: `신중하고 계획적인 성격으로 목표를 차근차근 달성해나가는 "차분한 실력자" 타입！`,
        job: '기획자, 연구원, 컨설턴트, 개발자',
        match: '에겐남 🎨（감성적이고 창의적인 남성）',
        music: ["IU「Love wins all」", "태연「INVU」", "에일리「I Will Go To You Like The First Snow」"],
        movie: ["기생충", "미나리", "인터스텔라"],
        color: '#8ac6ff'
      },
      '에겐남': {
        emoji: "🎨",
        title: '감성 풍부한 에겐남',
        description: `자신만의 세계관을 소중히 여기고 창의적인 생각을 하는 "개성파 아티스트" 타입！`,
        job: '크리에이터, 디자이너, 작가, 뮤지션',
        match: '테토녀 🧠（논리적이고 계획적인 여성）',
        music: ["BTS「Spring Day」", "IU「Through the Night」", "볼빨간사춘기「우주를 줄게」"],
        movie: ["너의 이름은", "월-E", "인사이드 아웃"],
        color: '#ff7eb3'
      },
      '테토남': {
        emoji: "🚀",
        title: '리더십 있는 테토남',
        description: `친구들로부터 신뢰받으며 새로운 도전을 두려워하지 않는 "카리스마 리더" 타입！`,
        job: '스타트업 대표, 영업팀장, 프로젝트 매니저, 컨설턴트',
        match: '에겐녀 💖（활발하고 사교적인 여성）',
        music: ["BTS「Dynamite」", "BLACKPINK「How You Like That」", "Stray Kids「God's Menu」"],
        movie: ["인터스텔라", "탑건: 매버릭", "어벤져스"],
        color: '#8ac6ff'
      }
    };

    // 테스트 상태 변수
    let currentQuestion = 0;
    let answers = [];
    let selectedGender = '';
    
    // 데이터 분석 변수
    let testStartTime = null;
    let questionTimes = [];
    let testSession = generateSessionId();
    let abTestVariant = Math.random() < 0.5 ? 'A' : 'B'; // A/B 테스트
    
    // 익명 통계 데이터
    const analytics = {
      sessionId: testSession,
      variant: abTestVariant,
      startTime: null,
      endTime: null,
      totalTime: null,
      questionTimes: [],
      answers: [],
      result: null,
      gender: null,
      dropoffPoint: null,
      userAgent: navigator.userAgent,
      screenResolution: `${screen.width}x${screen.height}`,
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      language: navigator.language
    };

    // 세션 ID 생성
    function generateSessionId() {
      return 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    // 익명 통계 전송
    function sendAnalytics(eventType, data = {}) {
      const payload = {
        ...analytics,
        eventType,
        timestamp: Date.now(),
        ...data
      };
      
      // 로컬 스토리지에 저장 (개발/테스트용)
      const storageKey = 'egen_teto_analytics';
      const existingData = JSON.parse(localStorage.getItem(storageKey) || '[]');
      existingData.push(payload);
      
      // 최대 100개 항목만 유지
      if (existingData.length > 100) {
        existingData.splice(0, existingData.length - 100);
      }
      
      localStorage.setItem(storageKey, JSON.stringify(existingData));
      
      // 실제 배포 시에는 서버로 전송 (현재는 콘솔에 출력)
      console.log('📊 Analytics Event:', eventType, payload);
      
      // Google Analytics 이벤트 (GA4)
      if (typeof gtag !== 'undefined') {
        gtag('event', eventType, {
          session_id: analytics.sessionId,
          variant: analytics.variant,
          custom_parameter: JSON.stringify(data)
        });
      }
    }

    // A/B 테스트 변형 적용
    function applyABTestVariant() {
      if (abTestVariant === 'B') {
        // B 변형: 질문 순서 약간 변경
        const bVariantQuestions = [...questions];
        // 3번째와 4번째 질문 순서 바꾸기
        if (bVariantQuestions.length >= 4) {
          [bVariantQuestions[2], bVariantQuestions[3]] = [bVariantQuestions[3], bVariantQuestions[2]];
        }
        return bVariantQuestions;
      }
      return questions;
    }

    // 성별 선택
    function selectGender(gender) {
      selectedGender = gender;
      analytics.gender = gender;
      
      // 성별 선택 통계 수집
      sendAnalytics('gender_selected', {
        selectedGender: gender,
        variant: abTestVariant
      });
      
      hapticFeedback('medium'); // 햅틱 피드백
      
      // 이전 선택 제거
      document.querySelectorAll('.gender-option').forEach(opt => {
        opt.classList.remove('selected');
        opt.setAttribute('aria-checked', 'false');
        opt.setAttribute('tabindex', '0');
      });
      
      // 현재 선택 표시
      const selectedOption = event.target.closest('.gender-option');
      selectedOption.classList.add('selected');
      selectedOption.setAttribute('aria-checked', 'true');
      selectedOption.setAttribute('tabindex', '0');
      
      // 시작 버튼 활성화
      document.getElementById('startBtn').disabled = false;
      hapticFeedback('success'); // 완료 햅틱
    }

    // 성별 선택 키보드 핸들러
    function handleGenderKeydown(event, gender) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        selectGender(gender);
      } else if (event.key === 'ArrowRight' || event.key === 'ArrowDown') {
        event.preventDefault();
        const options = document.querySelectorAll('.gender-option');
        const currentIndex = Array.from(options).indexOf(event.target);
        const nextIndex = (currentIndex + 1) % options.length;
        options[nextIndex].focus();
      } else if (event.key === 'ArrowLeft' || event.key === 'ArrowUp') {
        event.preventDefault();
        const options = document.querySelectorAll('.gender-option');
        const currentIndex = Array.from(options).indexOf(event.target);
        const prevIndex = (currentIndex - 1 + options.length) % options.length;
        options[prevIndex].focus();
      }
    }

    // 테스트 시작
    function startTest() {
      if (!selectedGender) {
        alert('성별을 선택해주세요!');
        return;
      }
      
      // 테스트 시작 시간 기록
      testStartTime = Date.now();
      analytics.startTime = testStartTime;
      
      // 테스트 시작 통계 수집
      sendAnalytics('test_started', {
        gender: selectedGender,
        variant: abTestVariant,
        startTime: testStartTime
      });
      
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('questionScreen').classList.remove('hidden');
      showQuestion();
    }

    // 질문 표시 (향상된 애니메이션)
    function showQuestion() {
      // 질문 시작 시간 기록
      const questionStartTime = Date.now();
      questionTimes[currentQuestion] = { start: questionStartTime };
      
      // A/B 테스트 변형 적용
      const testQuestions = applyABTestVariant();
      const question = testQuestions[currentQuestion];
      
      // 질문 표시 통계 수집
      sendAnalytics('question_shown', {
        questionNumber: currentQuestion + 1,
        questionText: question.question,
        variant: abTestVariant
      });
      const questionSection = document.querySelector('.question-section');
      
      // 질문 전환 애니메이션
      if (currentQuestion > 0) {
        questionSection.style.animation = 'questionTransition 0.6s ease-in-out';
        setTimeout(() => {
          updateQuestionContent();
          questionSection.style.animation = '';
        }, 300);
      } else {
        updateQuestionContent();
      }
      
      function updateQuestionContent() {
        document.getElementById('questionNumber').textContent = `질문 ${currentQuestion + 1}`;
        document.getElementById('questionText').textContent = question.question;
        
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        
        question.options.forEach((option, index) => {
          const optionDiv = document.createElement('div');
          optionDiv.className = 'option';
          optionDiv.textContent = option.text;
          optionDiv.setAttribute('role', 'radio');
          optionDiv.setAttribute('aria-checked', 'false');
          optionDiv.setAttribute('tabindex', '0');
          optionDiv.onclick = () => selectOption(index, optionDiv);
          optionDiv.onkeydown = (e) => handleOptionKeydown(e, index, optionDiv);
          
          // 순차적 애니메이션 딜레이
          optionDiv.style.animationDelay = `${index * 0.1}s`;
          container.appendChild(optionDiv);
        });

        updateProgress();
        document.getElementById('nextBtn').disabled = true;
        
        // 첫 번째 옵션에 포커스
        setTimeout(() => {
          const firstOption = container.querySelector('.option');
          if (firstOption) firstOption.focus();
        }, 400);
      }
    }

    // 옵션 키보드 핸들러
    function handleOptionKeydown(event, index, element) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        selectOption(index, element);
      } else if (event.key === 'ArrowDown') {
        event.preventDefault();
        const options = document.querySelectorAll('.option');
        const nextIndex = (index + 1) % options.length;
        options[nextIndex].focus();
      } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        const options = document.querySelectorAll('.option');
        const prevIndex = (index - 1 + options.length) % options.length;
        options[prevIndex].focus();
      }
    }

    // 스파클 효과 생성
    function createSparkles(element) {
      const rect = element.getBoundingClientRect();
      const container = document.createElement('div');
      container.className = 'sparkle-container';
      element.style.position = 'relative';
      
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          const sparkle = document.createElement('div');
          sparkle.className = 'sparkle';
          sparkle.style.left = Math.random() * rect.width + 'px';
          sparkle.style.top = Math.random() * rect.height + 'px';
          element.appendChild(sparkle);
          
          setTimeout(() => {
            if (sparkle.parentNode) {
              sparkle.parentNode.removeChild(sparkle);
            }
          }, 800);
        }, i * 100);
      }
    }

    // 옵션 선택 (개선된 인터랙션)
    function selectOption(index, element) {
      // 선택 중 시각적 피드백
      element.classList.add('selecting');
      
      setTimeout(() => {
        hapticFeedback('light'); // 선택 햅틱
        
        // 이전 선택 제거
        document.querySelectorAll('.option').forEach(opt => {
          opt.classList.remove('selected', 'selecting');
          opt.setAttribute('aria-checked', 'false');
        });
        
        // 현재 선택 표시
        element.classList.add('selected');
        element.setAttribute('aria-checked', 'true');
        
        // 스파클 효과 추가
        createSparkles(element);
        
        // 질문 응답 시간 기록
        const questionEndTime = Date.now();
        const questionDuration = questionEndTime - questionTimes[currentQuestion].start;
        questionTimes[currentQuestion].end = questionEndTime;
        questionTimes[currentQuestion].duration = questionDuration;
        
        // A/B 테스트 변형 적용
        const testQuestions = applyABTestVariant();
        const selectedAnswer = testQuestions[currentQuestion].options[index];
        
        // 답변 저장
        answers[currentQuestion] = selectedAnswer.type;
        analytics.answers.push({
          questionNumber: currentQuestion + 1,
          answerType: selectedAnswer.type,
          answerText: selectedAnswer.text,
          responseTime: questionDuration
        });
        
        // 답변 선택 통계 수집
        sendAnalytics('answer_selected', {
          questionNumber: currentQuestion + 1,
          answerType: selectedAnswer.type,
          responseTime: questionDuration,
          variant: abTestVariant
        });
        
        // 다음 버튼 활성화 (로딩 효과와 함께)
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.disabled = false;
        nextBtn.classList.add('loading');
        
        setTimeout(() => {
          nextBtn.classList.remove('loading');
        }, 300);
        
        hapticFeedback('success'); // 완료 햅틱
        
        // 스크린 리더를 위한 알림
        element.setAttribute('aria-live', 'polite');
        element.setAttribute('aria-label', `선택됨: ${element.textContent}`);
      }, 100);
    }

    // 다음 질문
    function nextQuestion() {
      currentQuestion++;
      
      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    // 진행률 업데이트 (향상된 애니메이션)
    function updateProgress() {
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');
      
      // 진행률 바 펄스 효과 (로딩 중)
      progressFill.style.animation = 'progressPulse 0.3s ease-in-out';
      
      setTimeout(() => {
        // 부드러운 진행률 애니메이션
        progressFill.style.transition = 'width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        progressFill.style.width = progress + '%';
        progressFill.style.animation = '';
        
        // 진행률이 특정 구간에 도달했을 때 추가 효과
        if (progress === 50) {
          hapticFeedback('medium');
          progressFill.style.animation = 'pulse 0.5s ease-in-out';
        } else if (progress === 100) {
          hapticFeedback('heavy');
          progressFill.style.animation = 'pulse 0.6s ease-in-out 2';
        }
      }, 200);
      
      // 숫자 카운트업 애니메이션 (더 부드럽게)
      const currentNum = parseInt(progressText.textContent.split(' / ')[0]);
      const targetNum = currentQuestion + 1;
      
      if (currentNum !== targetNum) {
        const duration = 500; // 0.5초
        const steps = Math.abs(targetNum - currentNum) * 5;
        const stepTime = duration / steps;
        
        let currentCount = currentNum;
        const increment = targetNum > currentCount ? 1 : -1;
        
        const countInterval = setInterval(() => {
          currentCount += increment;
          progressText.textContent = `${currentCount} / ${questions.length}`;
          progressText.style.animation = 'countUp 0.2s ease-out';
          
          if (currentCount === targetNum) {
            clearInterval(countInterval);
            setTimeout(() => {
              progressText.style.animation = '';
            }, 200);
          }
        }, stepTime);
      }
      
      // 진행률 바 접근성 업데이트
      const progressBar = document.querySelector('.progress-bar');
      progressBar.setAttribute('aria-valuenow', Math.round(progress));
      progressBar.setAttribute('aria-label', `테스트 진행률 ${Math.round(progress)}%, ${currentQuestion + 1}번째 질문`);
      
      // 마일스톤 달성 시 추가 피드백
      if ([25, 50, 75, 100].includes(Math.round(progress))) {
        setTimeout(() => {
          createProgressSparkles();
        }, 400);
      }
    }

    // 진행률 바 스파클 효과
    function createProgressSparkles() {
      const progressBar = document.querySelector('.progress-bar');
      const rect = progressBar.getBoundingClientRect();
      
      for (let i = 0; i < 2; i++) {
        setTimeout(() => {
          const sparkle = document.createElement('div');
          sparkle.className = 'sparkle';
          sparkle.style.position = 'absolute';
          sparkle.style.left = Math.random() * rect.width + 'px';
          sparkle.style.top = '-3px';
          sparkle.style.zIndex = '10';
          progressBar.style.position = 'relative';
          progressBar.appendChild(sparkle);
          
          setTimeout(() => {
            if (sparkle.parentNode) {
              sparkle.parentNode.removeChild(sparkle);
            }
          }, 800);
        }, i * 200);
      }
    }

    // 결과 표시
    function showResult() {
      // 테스트 완료 시간 기록
      const testEndTime = Date.now();
      const totalTestTime = testEndTime - testStartTime;
      
      analytics.endTime = testEndTime;
      analytics.totalTime = totalTestTime;
      analytics.questionTimes = questionTimes;
      
      // 답변 집계
      const count = { egen: 0, teto: 0 };
      answers.forEach(answer => count[answer]++);
      
      // 성별에 따른 결과
      const isEgen = count.egen > count.teto;
      const gender = selectedGender === 'female' ? '녀' : '남';
      const resultType = (isEgen ? '에겐' : '테토') + gender;
      
      const result = results[resultType];
      analytics.result = resultType;
      
      // 화면 전환
      document.getElementById('questionScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');
      
      // 결과 표시
      document.getElementById('resultEmoji').textContent = result.emoji;
      document.getElementById('resultTitle').textContent = result.title;
      document.getElementById('resultDescription').textContent = result.description;
      document.getElementById('resultJob').textContent = result.job;
      document.getElementById('resultMatch').textContent = result.match;
      document.getElementById('resultMusic').textContent = result.music.join(', ');
      document.getElementById('resultMovie').textContent = result.movie.join(', ');
      
      // 테스트 완료 통계 수집
      sendAnalytics('test_completed', {
        result: resultType,
        totalTime: totalTestTime,
        averageQuestionTime: totalTestTime / questions.length,
        egenCount: count.egen,
        tetoCount: count.teto,
        variant: abTestVariant,
        completionRate: 100
      });
      
      // 완료율 분석을 위한 추가 데이터
      sendAnalytics('funnel_completed', {
        step: 'result_shown',
        totalSteps: questions.length + 2, // 성별선택 + 질문들 + 결과
        completedSteps: questions.length + 2,
        conversionRate: 100
      });
    }

    // 통계 데이터 확인 함수 (개발용)
    function getAnalyticsData() {
      const data = JSON.parse(localStorage.getItem('egen_teto_analytics') || '[]');
      console.table(data);
      return data;
    }

    // 통계 요약 함수 (개발용)
    function getAnalyticsSummary() {
      const data = getAnalyticsData();
      const summary = {
        totalSessions: new Set(data.map(d => d.sessionId)).size,
        completedTests: data.filter(d => d.eventType === 'test_completed').length,
        averageTime: 0,
        popularResults: {},
        shareStats: {},
        dropoffPoints: {},
        abTestResults: { A: 0, B: 0 }
      };
      
      const completedTests = data.filter(d => d.eventType === 'test_completed');
      
      if (completedTests.length > 0) {
        summary.averageTime = completedTests.reduce((sum, test) => sum + test.totalTime, 0) / completedTests.length;
        
        completedTests.forEach(test => {
          summary.popularResults[test.result] = (summary.popularResults[test.result] || 0) + 1;
          summary.abTestResults[test.variant]++;
        });
      }
      
      data.filter(d => d.eventType === 'result_shared').forEach(share => {
        summary.shareStats[share.shareMethod] = (summary.shareStats[share.shareMethod] || 0) + 1;
      });
      
      data.filter(d => d.eventType === 'test_abandoned').forEach(abandon => {
        const point = `질문 ${abandon.dropoffQuestion}`;
        summary.dropoffPoints[point] = (summary.dropoffPoints[point] || 0) + 1;
      });
      
      console.log('📊 분석 요약:', summary);
      return summary;
    }

    // 향상된 WebP 지원 감지
    function supportsWebP() {
      return new Promise((resolve) => {
        const webP = new Image();
        webP.onload = webP.onerror = () => {
          resolve(webP.height === 2);
        };
        webP.src = 'data:image/webp;base64,UklGRjoAAABXRUJQVlA4IC4AAACyAgCdASoCAAIALmk0mk0iIiIiIgBoSygABc6WWgAA/veff/0PP8bA//LwYAAA';
      });
    }

    // WebP 지원 클래스 추가
    async function detectWebPSupport() {
      const supported = await supportsWebP();
      document.documentElement.classList.add(supported ? 'webp' : 'no-webp');
      return supported;
    }

    // 향상된 적응형 이미지 로딩
    function loadOptimizedImage(container, basePath, alt, options = {}) {
      return new Promise((resolve, reject) => {
        const {
          sizes = ['', '-mobile'],
          fallbackFormat = 'png',
          loadingClass = 'loading',
          errorClass = 'error'
        } = options;

        const img = document.createElement('img');
        const isMobile = window.innerWidth <= 768;
        
        // 로딩 상태 표시
        container.classList.add('image-loading');
        img.className = `optimized-image ${loadingClass}`;
        img.loading = 'lazy';
        img.alt = alt;
        
        detectWebPSupport().then((webpSupported) => {
          const extension = webpSupported ? '.webp' : `.${fallbackFormat}`;
          const size = isMobile ? sizes[1] : sizes[0];
          const primarySrc = `${basePath}${size}${extension}`;
          const fallbackSrc = `${basePath}${size}.${fallbackFormat}`;
          
          img.onload = () => {
            img.classList.remove(loadingClass);
            img.classList.add('loaded');
            container.classList.remove('image-loading');
            container.classList.add('loaded');
            container.appendChild(img);
            resolve(img);
          };
          
          img.onerror = () => {
            // WebP 실패 시 대체 포맷으로 재시도
            if (webpSupported && !img.src.includes(fallbackFormat)) {
              img.src = fallbackSrc;
            } else {
              img.classList.remove(loadingClass);
              img.classList.add(errorClass);
              container.classList.remove('image-loading');
              console.warn(`이미지 로딩 실패: ${img.src}`);
              reject(new Error('이미지 로딩 실패'));
            }
          };
          
          img.src = primarySrc;
        });
      });
    }

    // 향상된 지연 로딩 관찰자
    const imageObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          const container = img.closest('.image-container');
          
          if (img.dataset.src) {
            // 기본 지연 로딩
            img.classList.add('loading');
            img.src = img.dataset.src;
            
            img.onload = () => {
              img.classList.remove('loading');
              img.classList.add('loaded');
              if (container) container.classList.add('loaded');
            };
            
            img.onerror = () => {
              img.classList.remove('loading');
              img.classList.add('error');
            };
            
            imageObserver.unobserve(img);
          } else if (img.dataset.basePath) {
            // 최적화된 이미지 로딩
            loadOptimizedImage(
              container || img.parentElement,
              img.dataset.basePath,
              img.dataset.alt || img.alt || '이미지'
            ).catch(console.error);
            
            imageObserver.unobserve(img);
          }
        }
      });
    }, {
      rootMargin: '100px 0px',
      threshold: 0.1
    });

    // 이미지 프리로딩 함수
    function preloadCriticalImages() {
      const criticalImages = [
        '/egen-teto/ko/thumbnail',
        '/egen-teto/ko/favicon'
      ];

      detectWebPSupport().then((webpSupported) => {
        const extension = webpSupported ? '.webp' : '.png';
        
        criticalImages.forEach(basePath => {
          const link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = `${basePath}${extension}`;
          document.head.appendChild(link);
        });
      });
    }

    // 페이지 로드 시 이미지 최적화 초기화
    document.addEventListener('DOMContentLoaded', () => {
      // 페이지 로드 통계 수집
      sendAnalytics('page_loaded', {
        variant: abTestVariant,
        userAgent: navigator.userAgent,
        screenSize: `${screen.width}x${screen.height}`,
        language: navigator.language,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        referrer: document.referrer || 'direct'
      });
      
      // WebP 지원 감지 및 클래스 추가
      detectWebPSupport();
      
      // 중요 이미지 프리로딩
      preloadCriticalImages();
      
      // 지연 로딩 이미지들 관찰 시작
      document.querySelectorAll('img[data-src], img[data-base-path]').forEach(img => {
        img.classList.add('loading');
        imageObserver.observe(img);
      });
      
      // 이미지 컨테이너들 초기화
      document.querySelectorAll('.image-container').forEach(container => {
        if (!container.querySelector('img')) {
          container.classList.add('image-loading');
        }
      });
    });
  </script>
</body>
</html>
