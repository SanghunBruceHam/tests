  <!-- 공통 테마 CSS -->
  <link rel="stylesheet" href="/assets/common-theme.css">

  <!-- 페이지별 CSS -->
  <link rel="stylesheet" href="./assets/index-DOL7RTK1.css">

  <style>
    /* 레이아웃 충돌 방지 */
    .container {
      position: relative;
      z-index: 1;
    }

    /* 겹침 방지 */
    .main-content {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 20px;
      margin: 20px auto;
      max-width: 800px;
    }

    /* 다크모드 토글 위치 조정 */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <!-- 다크모드 토글 버튼 -->
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 변경">
    <span class="sun-icon">☀️</span>
    <span class="moon-icon">🌙</span>
  </button>

  <div class="main-content">
    <div id="root"></div>
  </div>

  <script type="module" src="./assets/index-zCtgUHeI.js"></script>

  <!-- 다크모드 스크립트 -->
  <script>
    // 다크모드 토글 함수
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);

      // 아이콘 표시 업데이트
      updateThemeIcon(newTheme);
    }

    // 테마 아이콘 업데이트
    function updateThemeIcon(theme) {
      const sunIcon = document.querySelector('.sun-icon');
      const moonIcon = document.querySelector('.moon-icon');

      if (theme === 'dark') {
        sunIcon.style.display = 'inline';
        moonIcon.style.display = 'none';
      } else {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'inline';
      }
    }

    // 초기 테마 설정
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);
    }

    // 페이지 로드 시 테마 초기화
    document.addEventListener('DOMContentLoaded', initTheme);
  </script>
</body>
</html>
