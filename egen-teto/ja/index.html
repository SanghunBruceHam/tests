    function shuffle(arr) {
      let a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;

        egenScore += score;

      document.getElementById(`q${qIdx}`).classList.remove("active");
      if (qIdx < totalQuestions) {
        document.getElementById(`q${qIdx+1}`).classList.add("active");
        currentQuestion++;
        updateProgress();

      const egenPct = Math.max(0, Math.min(100, Math.round((egenNorm / (egenNorm + tetoNorm)) * 100)));

      const gender = document.querySelector('input[name="gender"]:checked');
      let resultType;
      if (!gender) return;
      if (gender.value === "female") {
        resultType = egenPct > tetoPct ? "エゲン女子" : "テト女子";

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {

      } else {

        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("結果がコピーされました！");
      }
