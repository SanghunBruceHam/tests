      `;
      renderCelebList(resultType);
    }
    function renderCelebList(type) {
      const celebList = celebMap[type] || [];
      const INSTAGRAM_ICON = `<svg width="18" height="18" fill="none" viewBox="0 0 48 48"><rect width="36" height="36" x="6" y="6" rx="9" stroke="#e75480" stroke-width="3"/><circle cx="24" cy="24" r="8" stroke="#e75480" stroke-width="3"/><circle cx="31" cy="17" r="2" fill="#e75480"/></svg>`;
      const WIKI_ICON = `<svg width="18" height="18" fill="none" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" stroke="#1976d2" stroke-width="3"/><path d="M15 33L21 15L27 33L33 15" stroke="#1976d2" stroke-width="3"/></svg>`;
      const html = celebList.map(celeb => `
        <div class="celeb-card">
          <span class="celeb-emoji">${celeb.emoji}</span>
          <span class="celeb-name">${celeb.name}</span>
          <span class="celeb-desc">${celeb.desc}</span>
          <div class="celeb-links">
            ${celeb.instagram ? `<a class="celeb-link-icon" href="${celeb.instagram}" target="_blank" title="Instagram">${INSTAGRAM_ICON}</a>` : ''}
            ${celeb.wiki ? `<a class="celeb-link-icon" href="${celeb.wiki}" target="_blank" title="Wikipedia">${WIKI_ICON}</a>` : ''}
          </div>
        </div>
      `).join("");
      document.getElementById("celebList").innerHTML = html || "例なし";
    }
    function shareResult(platform) {
      const title = document.querySelector(".result-title")?.innerText || "";
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent(title + ' - 私も診断！');
      if (platform === "twitter") {
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
      } else if (platform === "facebook") {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
      } else if (platform === "threads") {
        window.open(`https://www.threads.net/intent/post?text=${text}%20${url}`, '_blank');
      }
    }
    function copyResult() {
      const title = document.querySelector(".result-title")?.innerText || "";
      const mascot = document.querySelector(".result-mascot")?.innerText || "";
      const desc = document.querySelector(".result-desc")?.innerText || "";
      const badges = Array.from(document.querySelectorAll(".result-badge")).map(x => x.innerText).join("\n");
      const link = window.location.href;
      const source = "\n\n出典：エゲン vs テト 性格テスト";
      const text = `${mascot} ${title}\n${desc}\n${badges}\nテストはこちら：${link}${source}`;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
          alert("結果がコピーされました！");
        });
      }
    }
    document.addEventListener('DOMContentLoaded', function() {
      renderStartCard();
    });
