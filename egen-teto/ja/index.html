    function updateProgress() {

      if (currentQuestion === 0) {
        const gender = document.querySelector('input[name="gender"]:checked');
        if (!gender) {
          alert("性別を選択してください。");
          return;

      const current = document.getElementById(`q${currentQuestion}`);
      if (current) current.classList.remove("active");
      currentQuestion++;
      const next = document.getElementById(`q${currentQuestion}`);
      if (next) {
        next.classList.add("active");
        updateProgress();
      } else {

      else if (type === 'teto') tetoScore++;

      const title = document.getElementById("result-title")?.innerText || "";

        navigator.clipboard.writeText(text).then(function() {
          alert("結果がコピーされました！");
        }, function() {
          alert("コピーに失敗しました。もう一度お試しください。");
        });

        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("結果がコピーされました！");
      }
