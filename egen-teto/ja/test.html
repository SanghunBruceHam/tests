          emoji: "🎤", name: "민현", desc: "NU'EST, Wanna One 韓国 아이돌",
          instagram: "https://www.instagram.com/optimushwang/", wiki: "https://ja.wikipedia.org/wiki/ファン・ミンヒョン"
        },
        {
          emoji: "🎮", name: "후지이 카즈야", desc: "JO1 일본 男性アイドル",
          instagram: "", wiki: "https://ja.wikipedia.org/wiki/藤井一葉"
        },
        {
          emoji: "👑", name: "김요한", desc: "WEi 韓国 男性アイドル",
          instagram: "https://www.instagram.com/yohan__kim/", wiki: "https://ja.wikipedia.org/wiki/キム・ヨハン"
        },
      ]
    };

    // 궁합 예시 (key는 "본인_상대")
    const compatibilityMap = {
      "エゲン女子_エゲン女子": "💖💖 감성 공감력 MAX! 서로의 섬세함과 배려를 느끼며 친밀해집니다.",
      "エゲン女子_テト女子": "💖💼 서로 성향이 달라서 처음엔 낯설 수 있지만, 금방 친해지는 콤비!",
      "エゲン女子_エゲン男子": "💖🎨 대화가 잘 통하고 서로를 위로하는 따뜻한 조합.",
      "エゲン女子_テト男子": "💖🚀 최고의 궁합! 서로의 부족함을 채워주는 완벽한 커플.",
      "テト女子_エゲン女子": "💼💖 서로의 성향 차이 덕분에 다양한 경험을 쌓을 수 있습니다.",
      "テト女子_テト女子": "💼💼 서로 리더십 강해 약간의 경쟁심이 생기기도, 서로를 자극하는 친구.",
      "テト女子_エゲン男子": "💼🎨 서로 잘 이해해주고 응원하는 관계, 일과 취미 모두 잘 맞음.",
      "テト女子_テト男子": "💼🚀 열정 만렙! 목표를 향해 함께 달려가는 든든한 팀.",
      "エゲン男子_エゲン女子": "🎨💖 섬세함+공감력 콤비, 대화가 끊이지 않는 베스트 친구.",
      "エゲン男子_テト女子": "🎨💼 사교적이고 활동적인 상대에게 자극을 많이 받는 조합.",
      "エゲン男子_エゲン男子": "🎨🎨 취미, 관심사가 잘 맞는 경우가 많아 금방 친해질 수 있음.",
      "エゲン男子_テト男子": "🎨🚀 든든한 리더와 크리에이터의 팀워크. 서로를 존중하는 사이.",
      "テト男子_エゲン女子": "🚀💖 최고의 궁합! 따뜻함과 추진력이 어우러진 커플.",
      "テト男子_テト女子": "🚀💼 주도적이고 적극적인 두 사람! 멋진 파트너십.",
      "テト男子_エゲン男子": "🚀🎨 도전과 응원의 긍정 에너지 가득한 관계.",
      "テト男子_テト男子": "🚀🚀 치열하지만 의외로 잘 맞는 동반자, 때론 경쟁자.",
    };

    let currentQuestion = 0;
    let egenScore = 0;
    let tetoScore = 0;
    const totalQuestions = 10;
    let pickedQuestions = [];
    let userResultType = "";

    function shuffle(arr) {
      let a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function renderQuestions() {
      pickedQuestions = shuffle(questionBank).slice(0, totalQuestions);
      let html = '';
      pickedQuestions.forEach((q, idx) => {
        if(q.type === 'scale') {
          html += `<div class="question" id="q${idx+1}" style="display:none;"><p>${idx+1}. ${q.q}</p>
            <div class="scale-btns">
              <button onclick="answer(${idx+1}, 2)">とてもそう思う</button>
              <button onclick="answer(${idx+1}, 1)">ややそう思う</button>
              <button onclick="answer(${idx+1}, 0)">どちらでもない</button>
              <button onclick="answer(${idx+1}, -1)">あまりそう思わない</button>
              <button onclick="answer(${idx+1}, -2)">全くそう思わない</button>
            </div>
          </div>`;
        } else {
          html += `<div class="question" id="q${idx+1}" style="display:none;"><p>${idx+1}. ${q.q}</p>
            <div class="answer-btns">
              <button onclick="answer(${idx+1}, 1)">はい</button>
              <button onclick="answer(${idx+1}, -1)">いいえ</button>
            </div>
          </div>`;
        }
      });
      document.getElementById('dynamic-questions').innerHTML = html;
    }
    function updateProgress() {
      document.getElementById("progress-bar").style.width = (currentQuestion / totalQuestions) * 100 + "%";
    }
    function nextQuestion() {
      if (currentQuestion === 0) {
        const gender = document.querySelector('input[name="gender"]:checked');
        if (!gender) { alert("性別を選択してください。"); return; }
        document.getElementById("q0").classList.remove("active");
        document.getElementById("q1").style.display = "flex";
        currentQuestion++;
        updateProgress();
        return;
      }
    }
    function answer(qIdx, score) {
      if ((qIdx-1) % 2 === 0) { egenScore += score; }
      else { tetoScore += score; }
      document.getElementById(`q${qIdx}`).style.display = "none";
      if (qIdx < totalQuestions) {
        document.getElementById(`q${qIdx+1}`).style.display = "flex";
        currentQuestion++;
        updateProgress();
      } else {
        showResult();
      }
    }
    function showResult() {
      const egenNorm = egenScore + 10;
      const tetoNorm = tetoScore + 10;
      const egenPct = Math.max(0, Math.min(100, Math.round((egenNorm / (egenNorm + tetoNorm)) * 100)));
      const tetoPct = 100 - egenPct;
      const gender = document.querySelector('input[name="gender"]:checked');
      if (!gender) return;
      let resultType = "";
      if (gender.value === "female") { resultType = egenPct > tetoPct ? "エゲン女子" : "テト女子"; }
      else { resultType = egenPct > tetoPct ? "エゲン男子" : "テト男子"; }
      userResultType = resultType;
      window.myResultType = resultType;

      const result = resultMap[resultType];

      // 결과 표시
      document.getElementById("result-title").innerText = result.title;
      document.getElementById("result-mascot").innerText = result.mascot;
      document.getElementById("result-description").innerText = result.description;
      document.getElementById("result-bestmatch").innerText = result.bestmatch;
      document.getElementById("result-recommendation").innerText = result.recommend;
      document.getElementById("result-music").innerText = "おすすめ音楽：" + result.music[Math.floor(Math.random() * result.music.length)];
      document.getElementById("result-movie").innerText = "おすすめ映画：" + result.movie[Math.floor(Math.random() * result.movie.length)];
      document.getElementById("score-graph").innerHTML =
        `<div class="score-bar"><span class="score-label">エゲン</span>
          <div class="bar-bg"><div class="bar-egen" style="width:${egenPct}%;"></div></div>
          <span class="bar-score">${egenPct}%</span>
        </div>
        <div class="score-bar"><span class="score-label">テト</span>
          <div class="bar-bg"><div class="bar-teto" style="width:${tetoPct}%;"></div></div>
          <span class="bar-score">${tetoPct}%</span>
        </div>`;
      document.getElementById("test").style.display = "none";
      document.getElementById("result").style.display = "flex";
      renderOtherTypeCards(resultType);
      renderCelebList(resultType);
      document.getElementById('compatibilityResult').innerText = "";
    }
    function renderCelebList(type) {
      const celebList = celebMap[type] || [];
      const INSTAGRAM_ICON = `<svg width="20" height="20" fill="none" viewBox="0 0 48 48"><rect width="36" height="36" x="6" y="6" rx="9" stroke="#e75480" stroke-width="3"/><circle cx="24" cy="24" r="8" stroke="#e75480" stroke-width="3"/><circle cx="31" cy="17" r="2" fill="#e75480"/></svg>`;
      const WIKI_ICON = `<svg width="20" height="20" fill="none" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" stroke="#1976d2" stroke-width="3"/><path d="M15 33L21 15L27 33L33 15" stroke="#1976d2" stroke-width="3"/></svg>`;
      const html = celebList.map(celeb => `
        <div class="celeb-card">
          <span class="celeb-emoji">${celeb.emoji}</span>
          <span class="celeb-name">${celeb.name}</span>
          <span class="celeb-desc">${celeb.desc}</span>
          <div class="celeb-links">
            ${celeb.instagram ? `<a class="celeb-link-icon" href="${celeb.instagram}" target="_blank" title="Instagram">${INSTAGRAM_ICON}</a>` : ''}
            ${celeb.wiki ? `<a class="celeb-link-icon" href="${celeb.wiki}" target="_blank" title="Wikipedia">${WIKI_ICON}</a>` : ''}
          </div>
        </div>
      `).join("");
      document.getElementById("celebList").innerHTML = html || "例なし";
    }
    // 다른 유형 카드
    function renderOtherTypeCards(myType) {
      const allTypes = ["エゲン女子","テト女子","エゲン男子","テト男子"];
      let html = '';
      allTypes.forEach(type => {
        if (type !== myType) {
          html += `<div class="mini-card" onclick="showTypeModal('${type}')">${type}</div>`;
        }
      });
      document.getElementById('otherTypeCards').innerHTML = html;
    }
    // 궁합 함수
    function showCompatibility(myType) {
      const matchType = document.getElementById('inputMatchType').value;
      const key = `${myType}_${matchType}`;
      const result = compatibilityMap[key];
      const el = document.getElementById('compatibilityResult');
      if (!matchType) {
        el.innerText = "相手のタイプを選択してください。";
        return;
      }
      el.innerText = result || "データがありません。";
    }
    // SNS 공유
    function shareResult(platform) {
      const title = document.getElementById("result-title")?.innerText || "";
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent(title + ' - 私も診断！');
      if (platform === "twitter") {
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
      } else if (platform === "facebook") {
        window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
      } else if (platform === "threads") {
        window.open(`https://www.threads.net/intent/post?text=${text}%20${url}`, '_blank');
      }
    }
    function copyResult() {
      const title = document.getElementById("result-title")?.innerText || "";
      const mascot = document.getElementById("result-mascot")?.innerText || "";
      const description = document.getElementById("result-description")?.innerText || "";
      const bestmatch = document.getElementById("result-bestmatch")?.innerText || "";
      const recommendation = document.getElementById("result-recommendation")?.innerText || "";
      const music = document.getElementById("result-music")?.innerText || "";
      const movie = document.getElementById("result-movie")?.innerText || "";
      const link = window.location.href;
      const source = "\n\n出典：エゲン vs テト 性格テスト";
      const text = `${mascot} ${title}\n${description}\n${bestmatch}\n${recommendation}\n${music}\n${movie}\nテストはこちら：${link}${source}`;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
          alert("結果がコピーされました！");
        });
      }
    }
    renderQuestions();
    function showTypeModal(type) {
      const info = resultMap[type];
      const modalHtml = `
        <div style="background:#fff;border-radius:16px;padding:28px 18px;max-width:350px;box-shadow:0 8px 28px #9999;position:relative;display:flex;flex-direction:column;align-items:center;">
          <button onclick="closeModal()" style="position:absolute;top:10px;right:15px;font-size:1.35rem;background:none;border:none;cursor:pointer;">✕</button>
          <h3 style="font-size:1.25rem;font-weight:900;color:${info.color};margin-bottom:7px;">${info.mascot} ${type}</h3>
          <div style="font-weight:700;">${info.title}</div>
          <div style="margin:13px 0;">${info.description}</div>
          <div style="color:#22B573;margin-bottom:8px;">${info.recommend}</div>
          <div style="color:#4970f5;margin-bottom:8px;">${info.bestmatch}</div>
          <div style="font-size:0.99rem;color:#999;">※ 더 상세한 정보, 유명인 예시는 다음 단계에 추가</div>
        </div>
      `;
      document.getElementById('typeModalContainer').innerHTML = modalHtml;
      document.getElementById('typeModalContainer').style.display = "flex";
    }
    function closeModal() {
      document.getElementById('typeModalContainer').style.display = "none";
    }
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('typeModalContainer').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });
    });
  </script>
