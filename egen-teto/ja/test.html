function shuffle(arr) {
  let a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function updateProgress() {

function renderQuestionCard() {
  const q = pickedQuestions[currentQuestion];
  let btnHtml = '';
  if (q.type === 'scale') {
    btnHtml = q.a.map((txt, idx) =>
      `<button class="answer-btn" onclick="answer(${idx - 2})">${txt}</button>`
    ).join('');
  } else {
    btnHtml = q.a.map((txt, idx) =>
      `<button class="answer-btn" onclick="answer(${idx === 0 ? 1 : -1})">${txt}</button>`
    ).join('');
  }
  document.getElementById('quiz-card').innerHTML = `
    <div class="quiz-title">${currentQuestion + 1}. ${q.q}</div>
    <div class="answer-group">${btnHtml}</div>
    <div class="watermark">© エゲン vs テト 性格テスト</div>

  `;
  updateProgress();
}
function answer(score) {
  if (currentQuestion % 2 === 0) egenScore += score;
  else tetoScore += score;
  currentQuestion++;
  if (currentQuestion < totalQuestions) {
    renderQuestionCard();
  } else {
    showResult();
  }
}
