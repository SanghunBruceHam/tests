  <script>
    // 다크모드 상태
    let isDarkMode = localStorage.getItem('darkMode') === 'true';

    // 페이지 로드시 초기화
    document.addEventListener('DOMContentLoaded', function() {
      updateTheme();
    });

    // 테마 변경 함수
    function updateTheme() {
      const themeToggle = document.querySelector('.theme-toggle');
      const icon = themeToggle.querySelector('i');

      if (isDarkMode) {
        document.documentElement.setAttribute('data-theme', 'dark');
        icon.className = 'fas fa-sun';
      } else {
        document.documentElement.removeAttribute('data-theme');
        icon.className = 'fas fa-moon';
      }

      localStorage.setItem('darkMode', isDarkMode);
    }

    // 성능 모니터링
    const performanceMonitor = {
      startTime: Date.now(),
      metrics: {},

      // Core Web Vitals 측정
      measureCWV() {
        // FCP (First Contentful Paint) 측정
        if ('PerformanceObserver' in window) {
          const observer = new PerformanceObserver((list) => {
            for (const entry of list.getEntries()) {
              if (entry.name === 'first-contentful-paint') {
                this.metrics.FCP = entry.startTime;
                this.sendMetric('FCP', entry.startTime);
              }
            }
          });
          observer.observe({ entryTypes: ['paint'] });

          // LCP (Largest Contentful Paint) 측정
          const lcpObserver = new PerformanceObserver((list) => {
            const entries = list.getEntries();
            const lastEntry = entries[entries.length - 1];
            this.metrics.LCP = lastEntry.startTime;
            this.sendMetric('LCP', lastEntry.startTime);
            this.sendMetric('LCP', lastEntry.startTime);
          });
          lcpObserver.observe({ entryTypes: ['largest-contentful-paint'] });

          // CLS (Cumulative Layout Shift) 측정
          let clsValue = 0;
          const clsObserver = new PerformanceObserver((list) => {
            for (const entry of list.getEntries()) {
              if (!entry.hadRecentInput) {
                clsValue += entry.value;
              }
            }
            this.metrics.CLS = clsValue;
            this.sendMetric('CLS', clsValue);
          });
          clsObserver.observe({ entryTypes: ['layout-shift'] });
        }

        // 페이지 로딩 시간 측정
        window.addEventListener('load', () => {
          const loadTime = Date.now() - this.startTime;
          this.metrics.loadTime = loadTime;
          this.sendMetric('page_load_time', loadTime);

          // Navigation API 지원 시 더 정확한 측정
          if ('performance' in window && 'getEntriesByType' in performance) {
            const navEntries = performance.getEntriesByType('navigation');
            if (navEntries.length > 0) {
              const nav = navEntries[0];
              this.sendMetric('dom_content_loaded', nav.domContentLoadedEventEnd - nav.domContentLoadedEventStart);
              this.sendMetric('dom_interactive', nav.domInteractive - nav.fetchStart);
            }
          }
        });
      },

      // 메트릭 전송
      sendMetric(name, value) {
        if (window.gtag) {
          gtag('event', 'performance_metric', {
            metric_name: name,
            metric_value: Math.round(value),
            device_type: this.getDeviceType(),
            connection_type: this.getConnectionType()
          });
        }
      },

      // 디바이스 타입 감지
      getDeviceType() {
        const width = window.innerWidth;
        if (width < 480) return 'mobile';
        if (width < 768) return 'tablet';
        return 'desktop';
      },

      // 연결 타입 감지
      getConnectionType() {
        if ('connection' in navigator) {
          return navigator.connection.effectiveType || 'unknown';
        }
        return 'unknown';
      },

      // 성능 이슈 감지
      detectPerformanceIssues() {
        setTimeout(() => {
          if (this.metrics.LCP > 2500) {
            this.sendMetric('performance_issue', 'slow_lcp');
          }
          if (this.metrics.CLS > 0.1) {
            this.sendMetric('performance_issue', 'high_cls');
          }
          if (this.metrics.loadTime > 3000) {
            this.sendMetric('performance_issue', 'slow_load');
          }
        }, 3000);
      },

      // 메모리 사용량 모니터링
      monitorMemory() {
        if ('memory' in performance) {
          setInterval(() => {
            const memory = performance.memory;
            this.sendMetric('memory_used', memory.usedJSHeapSize);
            this.sendMetric('memory_total', memory.totalJSHeapSize);

            // 메모리 사용률이 높은 경우 경고
            const usage = memory.usedJSHeapSize / memory.totalJSHeapSize;
            if (usage > 0.9) {
              this.sendMetric('performance_issue', 'high_memory');
            }
          }, 30000); // 30초마다 체크
        }
      }
    };

    // 성능 모니터링 시작
    performanceMonitor.measureCWV();
    performanceMonitor.detectPerformanceIssues();
    performanceMonitor.monitorMemory();

    // 사용자 상호작용 지연 측정
    let interactionStart = 0;
    document.addEventListener('click', () => {
      interactionStart = Date.now();
    });

    // 이벤트 리스너
    document.querySelector('.theme-toggle').addEventListener('click', () => {
      const responseTime = Date.now() - interactionStart;
      performanceMonitor.sendMetric('theme_toggle_response', responseTime);

      isDarkMode = !isDarkMode;
      updateTheme();
    });

    // 에러 모니터링
    window.addEventListener('error', (e) => {
      if (window.gtag) {
        gtag('event', 'javascript_error', {
          error_message: e.message,
          error_filename: e.filename,
          error_lineno: e.lineno,
          error_colno: e.colno
        });
      }
    });

    // 언핸들드 Promise 에러 모니터링
    window.addEventListener('unhandledrejection', (e) => {
      if (window.gtag) {
        gtag('event', 'promise_rejection', {
          error_reason: e.reason
        });
      }
    });
  </script>
